Welcome, President Julio Argentino Roca! You lead the Argentinian civilization, full of hopeful and dreamful people. Born from a prominent family, you joined the Argentine Confederation army while still an adolescent, and as a general you came to understand how the army was an agent of national unification. And that unification came with your rise to power, with your two terms as president: under them, your nation went through many changes, including a bloody war with the Mapuche, a treaty with Chile, increased immigration from Europe, expansion of the agriculture and pastures, and laicizing legislation strengthening state power. Thanks to your efforts, Argentina took the path to modernity, and in gratitude several cities, parks, monuments and schools were founded in your honour. = Benvenuto, Presidente Julio Argentino Roca! Tu sei a capo della nazione argentina, popolata da persone piene di sogni e speranze. Nato da una famiglia illustre, tu ti arruolasti nell'esercito della Confederazione Argentina quando eri ancora un adolescente e, da generale, comprendesti come l'esercito fosse un agente di unificazione nazionale. Quell'unificazione era arrivata con la tua ascesa al potere, con i tuoi due mandati da presidente: sotto di essi, la tua nazione attraversò molti cambiamenti, tra cui una sanguinosa guerra con i Mapuche, un inedito trattato con il Cile, una maggiore immigrazione dall'Europa, l'espansione dell'agricoltura e dei pascoli e una legislazione laicizzante che rafforzò il potere dello Stato. Grazie ai tuoi sforzi, l'Argentina intraprese la strada della modernità, e in segno di gratitudine sono state fondate diverse città, parchi, monumenti e scuole in tuo onore.
Insightful and brave leader, your people welcome you with open arms once again, and claim that the sun must shine on your land and all the world. Can you modernise your nation once more and lead it into a new age of glory? Can you build a civilization that will stand the test of time? = Perspicace e coraggioso presidente, il tuo popolo ti accoglie a braccia aperte ancora una volta, e afferma che il sole debba splendere sulla tua terra e su tutto il mondo. Saprai modernizzare ancora una volta la tua nazione e a condurla verso una nuova era di gloria? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
I'm sorry to hear these words. But I won't be sorry for making you eat them. = Mi dispiace sentire queste parole. Ma non mi pentirò di fartele rimangiare.

