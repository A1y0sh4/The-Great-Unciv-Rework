+1 [Science] in all cities within 3 tiles of a Holy site (+1 additional [Science] per passed era)\n+20% Strength for Military units within 3 tiles of a Holy site in Friendly Land tiles\nUpon constructing a Holy site, gain control of its surrounding tiles = +1 [Science] in tutte le città entro 3 caselle da Luogo sacro (e +1 [Science] aggiuntiva per epoca)\n+20% Forza per le unità militari entro 3 caselle da Luogo sacro in territorio amico\nQuando costruisci un Luogo sacro, ottieni il controllo delle caselle circostanti
Your lie-ridden words only prove that your rule is a disgrace. = Le tue parole piene di bugie dimostrano solo che il tuo governo è una vergogna.

Ancient Regime = Ancient Regime
Long life and triumph to you, First Consul and Emperor of France, Napoleon I, ruler of the French people. France lies at the heart of Europe. Long has Paris been the world center of culture, arts and letters. Although surrounded by competitors - and often enemies - France has endured as a great nation. Its armies have marched triumphantly into battle from one end of the world to the other, its soldiers and generals among the best in history. = Lunga vita e trionfi a te, primo console e imperatore di Francia, Napoleone I, capo del popolo francese. La Francia giace nel cuore dell'Europa. Per lungo tempo Parigi è stata al centro del mondo in fatto di cultura, arti e letteratura. Anche se circondata da nazioni concorrenti, e spesso nemiche, la Francia è sempre emersa a testa alta. I suoi eserciti hanno marciato trionfalmente da un capo all'altro del mondo e i suoi soldati e i tuoi generali si sono rivelati tra i migliori della storia.
Napoleon Bonaparte, France yearns for you to rebuild your empire, to lead her once more to glory and greatness, to make France once more the epicenter of culture and refinement. Emperor, will you ride once more against your foes? Can you build a civilization that will stand the test of time? = Napoleone Bonaparte, la Francia vuole che tu ricostruisca il tuo impero, che la guidi nuovamente verso la gloria e la grandezza, facendola tornare ad essere il centro della cultura e raffinatezza. Imperatore, tornerai a cavalcare contro i tuoi nemici? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Avignon = Avignone
Gain +1 [Culture] and +1 [Gold] in capital for every Luxury resource you own\nMilitary units gain a bit more of XP for every Luxury resource you own (both when built and when fighting) = Per ogni risorsa di lusso che possiedi, +1 [Culture] e [Gold] nella Capitale, e le unità ottengono più XP (sia quando vengono costruite che quando combattono)
Gain +1 [Culture] in capital for every Luxury resource you own\nMilitary units gain a bit more of XP for every Luxury resource you own (both when built and when fighting) = Per ogni risorsa di lusso che possiedi, la Capitale ottiene +1 [Culture] e le unità militari ottengono una tantum di esperienza in più (sia quando costruite che quando combattono)
The glory and might of France will certainly not be tarnished by such obvious lies. = La gloria e la potenza della Francia non saranno certo offuscate da menzogne ​​così evidenti.

Tamar = Tamara
God fights with us. You stand alone. = Dio combatte al nostro fianco. Tu lotti da solo.
Georgian hearts will not tremble before your multitudes. = I cuoi georgiani resteranno saldi di fronte alle tue moltitudini.
Walls weren't enough to save Georgia from ruin. And neither was I. = Nessuna muraglia è bastata per salvare la Georgia dalla rovina. E nemmeno io.
I am Tamar of Georgia. Say what you will and be on your way... unless you wish to admire my walls. = Io sono Tamara di Georgia. Dì ciò che vuoi e va per la tua strada... a meno che non intenda ammirare le mie mura.
Georgian merchants bring many strings of churchkhela. They make a filling dessert. = I miei mercanti portano tante strisce di churchkhela: è un dessert delizioso e nutriente.
Have your say. = Parla pure.
Well? What is it? = Ebbene? Cosa c'è?
