Foolish and feeble! How have you not been conquered yet? = Stolti e deboli, tu e il tuo popolo! Come mai non siete ancora stati conquistati?

Amanitore = Amanitore
We have arrows, finely honed. We shall deliver them freely to your throat. = Le nostre sono freccie piumate e rifinite. E siamo lieti di scoccarle nelle vostre gole.
As predicted, you know only how to take. Come, then—choose the manner of your defeat. = Come prevedevo, l'unica cosa che sai fare è prendere. Vieni, dunque: scegli il modo in cui desideri essere sconfitto.
Though Nubia declines, our pyramids shall remain long after your plans fall to ruin. = Sì, questo è il declino della Nubia, ma le nostre piramidi esisteranno ancora per mille millenni.
I am Amanitore of Nubia. All are welcome in our magnificent cities — provided they come as friends. = Sono Amanitore, regina della Nubia, e accolgo tutti nelle mie magnifiche città... a patto che abbiano intenzioni amichevoli.
