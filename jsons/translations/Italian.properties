Mekeya wo, noble Osei Tutu, Asantehene of the Ashanti people! The Akan states of southern Ghana were renowed centers for trade and gold. Yet, they remained divided, lost to petty rivalries and ancient conflicts. Great King, together with your advisor Okomfo Anokye, you rose to forge a union whose sophistication and military prowess was nearly unmatched in sub-Saharan Africa. By uniting the warring Ashanti chiefs, you overthrew the Denkyera and laid the foundation for a divine kingship. Yet, as your people expanded to today Ivory Coast, conflict with the European powers would prove inevitable. Though your kingdom resisted longer than most, even Ashantiland would ultimately fall to the march of imperialism. = Mekeya wo, nobile Osei Tutu, Asantehene del popolo Ashanti! Gli stati Akan del Ghana meridionale erano rinomati centri per il commercio e l'oro; eppure rimasero divisi, persi a causa di meschine rivalità e antichi conflitti. Grande Re, insieme al tuo consigliere Okomfo Anokye, sei riuscito a forgiare un'unione la cui raffinatezza e abilità militare erano quasi senza eguali nell'Africa sub-sahariana. Unendo i capi Ashanti in guerra, hai rovesciato i Denkyera e gettato le basi per una regalità divina. Tuttavia, con l’espansione del vostro popolo fino all'odierna Costa d’Avorio, il conflitto con le potenze europee si è rivelato inevitabile. Anche se il tuo regno resistette più a lungo degli altri, anche l'impero di Ashanti alla fine cadde sotto la marcia dell'imperialismo.
Kumasihene, foreign crowns have ravaged your lands. Your people pray to their ancestors and look to the spirit of the Ashanti nation for guidance. It is time to return, to finally cross the River Pra and free your people. Will you heed the call to once more sit upon the Golden Stool? Can you build a civilization that will stand the test of time? = Kumasihene, gli imperi stranieri hanno devastato le tue terre. Il tuo popolo prega i propri antenati e cerca guida nello spirito della nazione Ashanti. È tempo di ritornare, di attraversare finalmente il fiume Pra e liberare il tuo popolo. Ascolterai la chiamata e ti sedierai ancora una volta sullo Sgabello d'Oro? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
