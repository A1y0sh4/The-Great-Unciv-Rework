Great People are earned 15% faster\nGain [Science] upon expending a Great Person (scales through eras) = +15% generazione dei Grandi Personaggi, e ottieni [Science] quando ne sacrifichi uno (in base all'Epoca)
In Sweden, we have many amusing folk songs that depict people like you as villains. Even the simplest arts imitate truths of life. = In Svezia abbiamo molte canzoni popolari divertenti che descrivono persone come te come dei cattivi. Anche le arti più semplici imitano le verità della vita.

Jefferson Davis = Jefferson Davis
The people of the Confederate States of America welcome you. = Buongiorno. Vi do il benvenuto da parte dei cittadini degli Stati Confederati d'America.
