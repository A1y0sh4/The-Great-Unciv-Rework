I will tell you clear as the sun and real slowly - that was not very nice of you. = Te lo dirò con chiarezza e con molta calma: non è stato molto bello da parte tua.

Simón Bolívar = Simón Bolívar
Your tyranny, if unchecked, dooms the world to darkness, and for this reason I must declare war on you. = Lasciar scorrere una tirannia come la vostra porta il mondo alla barbaria, ed è per questa ragione che devo dichiararvi guerra!
Recourse to war is regrettable, but necessary, when dealing with vipers like you. = Ricorrere alla guerra è un gesto spiacevole, ma diventa necessario quando si tratta di affrontare vipere come voi.
Everything I have done, I did for the nation of Gran Colombia. I remain a patriot to the very end. = Tutto ciò che ho fatto, l'ho fatto per la nazione della Gran Colombia. Io rimango un patriota fino alla fine.
I, President Simón Bolívar, welcome you to Gran Colombia. = Sono il presidente Simón Bolívar, e vi do il benvenuto nello stato della Gran Colombia.
I send to you a delegation of my finest horsemen. Will you let them in? = Ti ho mandato una delegazione dei miei migliori cavalieri. Vuoi lasciarli entrare?
Tyrant! = Lungi da me, tiranno!
