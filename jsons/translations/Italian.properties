Light and Gunpowder units are 15% stronger, can ignore Zones of Control and can move after attacking while in Friendly Land = Più Forza per le unità appiedate e con polvere da sparo, che ignorano le Zone di Controllo e possono muoversi dopo aver attaccato in territorio amico
Hail Bà Triệu, brave female warrior of Vietnam! Yours is a peaceful nation, and your people live for prosperity. But you lived in a time where war was the only option, and were to lead a rebellion against Wu, one of the Three Kingdoms that were born from the fall of the Han dynasty; you rose with the rage of the dragon and your countrymen followed you. Alas, the revolt failed, and you were put to death, but your brave uprising would be depicted in modern Vietnam as one of the many chapters in its long struggle to end foreign domination: ignoring some glorious dynasties, your people went though several masters, from China to Khmer to France, but in the end, even though it ceased to be a monarchy, Vietnam defeated the might of the United States and became free, perhaps due to the spirit of people such as you and the Trung Sisters. = Saluti, Bà Triệu, coraggiosa guerriera del Vietnam! La tua è una nazione pacifica e il tuo popolo vive per la prosperità. Ma tu hai vissuto in un'epoca in cui la guerra era l'unica opzione e hai dovuto guidare una ribellione contro Wu, uno dei Tre Regni nati dalla caduta della dinastia Han; ti sei sollevata con la rabbia del drago e i tuoi connazionali ti hanno seguito. Ahimè, la rivolta fallì e tu fosti messa a morte, ma la tua coraggiosa lotta per la libertà sarebbe stata rappresentata nel Vietnam moderno come uno dei tanti capitoli della sua lunga lotta per porre fine al dominio straniero: tra una dinastia e l'altra, il tuo popolo dovette servire diversi padroni, dalla Cina ai Khmer alla Francia, ma alla fine, nonostante non fosse stato più una monarchia, il Vietnam sconfisse i potenti Stati Uniti e divenne libero, certo grazie allo spirito di persone come te e le sorelle Trung.
Undomitable Bà Triệu, your people still remember you as a goddess, but now the world has grown more threacherous, and you have more enemies than just China: you face a host of barbarians, eager to enslave the people of a proud nation. O brave she-warrior, will you stand against those who would try to rein in your storm and raise your sword in defiance? Will you rise once more and fight for a free Vietnam? Can you build a civilization that will stand the test of time? = Indomabile Bà Triệu, il tuo popolo ti ricorda ancora come una dea, ma ora il mondo è diventato assai più pericoloso; non c'è più solo la Cina, ma un'intera schiera di barbari desiderosi di schiavizzare il popolo di una nazione orgogliosa. O coraggiosa guerriera, ti opporrai a coloro che cercheranno di frenare la tua tempesta e di alzare la tua spada in segno di sfida? Ti solleverai ancora una volta a combattere per un Vietnam libero? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
You cannot content yourself with ruling your people, but you must interfere with mine as well? I shall tell the world of your crimes! = Non sapendo accontentarti di governare il tuo popolo, devi interferire anche con il mio? Il mondo deve conoscere i tuoi crimini!

Shaka = Shaka
None will slow our progress, not even you! Prepare for war! = Niente e nessuno rallenterà la nostra avanzata, neanche tu! Preparati a morire!
Your arrogance will only lead you to defeat! = La tua arroganza ti porterà solo alla sconfitta!
My warriors have failed, and so I failed them. = I miei guerrieri hanno fallito. E così, io ho fallito loro.
I'm Shaka of Zulu. Don't try to move, warrior, or I'll destroy you. = Sono Shaka degli Zulu. Non provare a muoverti, guerriero, o ti distruggerò.
Approve the closure sell. = Approvi questo piano?
Hail your Majesty! = Salute, vostra Maestà...!
You say? What are you doing here? = Ebbene? Cosa fai qui?
Iklwa = Iklwa
Your people kneel before you, great warrior Shaka of the Zulu Kingdom. As you rose from a place of exile to become the true leader of the Zulus, you ushered in changes throughout the Zulu society, implementing new laws and cultural reforms that strengthened the position of your kingdom. However, it was your tenacity in the art of war that truly established your reputation, as your tactics and strategies on the battlefield forever changed the face of combat across the plains of southern Africa. = Il tuo popolo si inchina davanti a te, grande guerriero Shaka del regno Zulu. Dall'esilio sei riuscito a salire al potere fino a diventare leader di tutti gli Zulu e hai profondamente cambiato la società, promulgando leggi e riforme culturali che hanno rafforzato il regno. Ma è la tenacia nell'arte della guerra che ti ha reso veramente famoso: la tua strategia e le tue tattiche sul campo di battaglia hanno segnato per sempre il modo di combattere nelle pianure dell'Africa meridionale.
Most formidable king, your people once again long for the unity and strength your leadership afforded them. Can you return the Zulu kingdom to such great prominence? Will you build a civilization that stands the test of time? = Formidabile re, il tuo popolo desidera possedere ancora l'unità e la forza che aveva raggiunto sotto il tuo comando. Riporterai il regno Zulu a una posizione di preminenza? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?ì
