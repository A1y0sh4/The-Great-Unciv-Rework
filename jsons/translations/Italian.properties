'An individual tends to absorb the surrounding spirit and to radiate the acquired lifestyle and worldview to anyone around, not just to a select friend.' - Andrej Kolmogorov = 'Un individuo tende ad assorbire lo spirito circostante e a irradiare lo stile di vita e la visione del mondo acquisiti a chiunque gli stia intorno, non solo a una ristretta cerchia di amici.' - Andrej Kolmogorov

'One spy in the right place is worth twenty thousand men in the field.' - Napoleon Bonaparte = 'Una spia nel posto giusto vale ventimila uomini sul campo.' - Napoleon Bonaparte

'The mark of a great city isn’t how it treats its special places – everybody does that right – but how it treats its ordinary ones.' - Aaron M. Renn = 'Il segno distintivo di una grande città non è come tratta i suoi luoghi speciali – cosa che tutti sanno fare bene – ma come tratta quelli ordinari.' - Aaron M. Renn

'It is important to leave a better land for our descendants.' - Theodore Roosevelt = 'È importante lasciare una terra migliore ai nostri discendenti.' - Theodore Roosevelt

'Can a nation be free if it oppresses other nations? It cannot.' - Vladimir Lenin = 'Può una nazione essere libera se opprime altre nazioni? No, non può.' - Vladimir Lenin

'Every gun that is made, every warship launched, every rocket fired, signifies in the final sense a theft from those who hunger and are not fed, those who are cold and are not clothed.' - Dwight D. Eisenhower = 'Ogni arma prodotta, ogni nave da guerra varata, ogni razzo lanciato, in ultima analisi rappresenta un furto ai danni di chi soffre la fame e non viene nutrito, di chi ha freddo e non viene vestito.' - Dwight D. Eisenhower

'We should be on our guard not to overestimate science and scientific methods when it is a question of human problems; and we should not assume that experts are the only ones who have a right to express themselves on questions affecting the organization of society.' - Albert Einstein = 'Dobbiamo guardarci dal sopravvalutare la scienza e i metodi scientifici quando si tratta di problemi umani; e non dobbiamo presumere che solo gli esperti abbiano il diritto di esprimersi su questioni che riguardano l'organizzazione della società.' - Albert Einstein

'A computer can never be held accountable, therefore a computer must never make a management decision.' - caution from 1917 IBM presentation = 'Un computer non può mai essere ritenuto responsabile, pertanto un computer non deve mai prendere decisioni gestionali.' - Avvertenza tratta da una presentazione IBM del 1917

'The ruling ideas of each age have ever been the ideas of its ruling class. When people speak of the ideas that revolutionise society, they do but express that fact that within the old society the elements of a new one have been created, and that the dissolution of the old ideas keeps even pace with the dissolution of the old conditions of existence.' - Karl Marx & Friedrich Engels = 'Le idee dominanti di ogni epoca sono sempre state le idee della sua classe dominante. Quando si parla di idee che rivoluzionano la società, si esprime semplicemente il fatto che all'interno della vecchia società si sono creati gli elementi di una nuova, e che la dissoluzione delle vecchie idee procede di pari passo con la dissoluzione delle vecchie condizioni di esistenza.' - Karl Marx e Friedrich Engels

'We must come to the inevitable conclusion that the guerrilla fighter is a social reformer, that he takes up arms responding to the angry protest of the people against their oppressors, and that he fights in order to change the social system that keeps all his unarmed brothers in ignominy and misery.' - Ernesto Guevara = 'Dobbiamo giungere all'inevitabile conclusione che il guerrigliero è un riformatore sociale, che imbraccia le armi in risposta alla protesta rabbiosa del popolo contro i suoi oppressori e che combatte per cambiare il sistema sociale che tiene tutti i suoi fratelli disarmati nell'ignominia e nella miseria.' - Ernesto Guevara

'The nuclear arms race is like two sworn enemies standing waist deep in gasoline, one with three matches, the other with five.' – Carl Sagan = 'La corsa agli armamenti nucleari è come due nemici giurati immersi fino alla vita nella benzina, uno con tre fiammiferi in mano, l'altro con cinque.' – Carl Sagan

'Looking at the earth from afar you realize it is too small for conflict and just big enough for co-operation.' - Yuri Gagarin = 'Osservando la Terra da lontano, ci si rende conto che è troppo piccola per i conflitti e sufficientemente grande per la cooperazione.' - Yuri Gagarin

'A laser is a weak source of energy... But with a laser, you can drill a hole in a diamond or wipe out cancer.' - Al Ries = 'Un laser è una fonte di energia debole... Ma con un laser si può praticare un foro in un diamante o debellare il cancro.' - Al Ries

'Designed to leave the world's economic destiny at the mercy of bankers and multinational corporations, Globalization is a logical extension of imperialism, a victory of empire over republic, international finance capital over democracy.' - Michael Parenti = 'Concepito per lasciare il destino economico mondiale in balia di banchieri e multinazionali, la globalizzazione è una naturale estensione dell'imperialismo, una vittoria dell'impero sulla repubblica, del capitale finanziario internazionale sulla democrazia.' - Michael Parenti

'If you think you understand quantum mechanics, you don’t understand quantum mechanics.' - Richard Feynman = 'Se pensi di capire la meccanica quantistica, in realtà non la capisci.' - Richard Feynman

'Nanotechnology is the idea that we can create devices and machines all the way down to the nanometer scale, which is a billionth of a meter, about half the width of a human DNA molecule.' - Paul McEuen = 'La nanotecnologia è l'idea che possiamo creare dispositivi e macchine fino alla scala del nanometro, ovvero un miliardesimo di metro, circa la metà della larghezza di una molecola di DNA umano.' - Paul McEuen

'Keep the enemy in the dark about where and when our forces will attack.' - Mao Zedong = 'Teniamo il nemico all'oscuro di dove e quando le nostre forze attaccheranno.' - Mao Zedong

'I would like nuclear fusion to become a practical power source. It would provide an inexhaustible supply of energy, without pollution or global warming.' - Stephen Hawking = 'Vorrei che la fusione nucleare diventasse una fonte di energia praticabile. Fornirebbe una fonte di energia inesauribile, senza inquinamento né riscaldamento globale.' - Stephen Hawking

'By far the greatest danger of Artificial Intelligence is that people conclude too early that they understand it.' - Eliezer Yudkowsky = 'Il pericolo maggiore dell'intelligenza artificiale è che le persone giungano troppo presto alla conclusione di comprenderla.' - Eliezer Yudkowsky

