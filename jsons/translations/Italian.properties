A serpent that remains hidden will grow old. You have just revealed yourself. = Un serpente che rimane nascosto è destinato a invecchiare. Tu ti sei appena rivelato.

You. = Tu...
Your people kneel before you, exalted King Pacal the Great, favored son of the gods and shield to the citizens of the Palenque domain. After years of strife at the hands of your neighboring rivals, you struck back at the enemies of your people, sacrificing their leaders in retribution for the insults dealt to your predecessors. The glory of Palenque was restored only by the guidance afforded by your wisdom, as you orchestrated vast reconstruction efforts within the city, creating some of the greatest monuments and architecture your people - and the world - have ever known. = Il tuo popolo si inchina davanti a te, altissimo re Pacal il grande, figlio favorito dagli dèi e scudo dei cittadini di Palenque. Dopo anni di tormenti per mano dei regni vicini, hai sferrato l'attacco ai nemici del tuo popolo, offrendo i loro condottieri in sacrificio per lavare l'insulto inflitto ai tuoi predecessori. Palenque è tornata alla gloria sotto la tua guida saggia, grazie al vasto piano di ricostruzione della città e alla creazione di alcuni dei monumenti più grandiosi che il tuo popolo - e il mondo stesso - abbia mai visto.
Illustrious King, your people once again look to you for leadership and counsel in the coming days. Will you channel the will of the gods and restore your once proud kingdom to its greatest heights? Will you build new monuments to forever enshrine the memories of your people? Can you build a civilization that will stand the test of time? = Illustre monarca, la tua gente si rivolge ancora una volta a te per essere condotta e consigliata. Interpreterai la volotà degli dèi e riporterai all'apice il tuo nobile regno? Costruirai nuovi monumenti per conservare in eterno la memoria del tuo popolo come in un santuario? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Receive a free Great Person at the end of every Maya Long Count calendar cycle (every 394 years), after researching [Spirituality] (each bonus person can only be chosen once).\nOnce The Long Count activates, the year on the world screen displays as the traditional Mayan Long Count.\nGenerate Great People points at 1/3 of the normal speed and Great Improvements yield -1 amount of their respective stat = Una volta scoperto [Spirituality], ricevi un Grande Personaggio a tua scelta alla fine di ogni ciclo del calendario del Conto Lungo dei Maya (ogni 394 anni, uno per volta)\nUna volta attivato il Conto Lungo dei Maya, l'anno nel gioco è mostrato in esso come da tradizione\nI Grandi Personaggi nascono a 1/3 della loro velocità normale, e -1 resa rispettiva dai Grandi Miglioramenti
Receive a free Great Person at the end of every Maya Long Count calendar cycle (every 394 years), after researching [Spirituality] (each bonus person can only be chosen once).\nOnce The Long Count activates, the year on the world screen displays as the traditional Mayan Long Count.\nGreat Improvements yield half the amount of their respective stat and Great People points are generated at half the normal speed = Una volta scoperto [Spirituality], ricevi un Grande Personaggio a tua scelta alla fine di ogni ciclo del calendario del Conto Lungo dei Maya (ogni 394 anni, uno per volta)\nUna volta attivato il Conto Lungo dei Maya, l'anno nel gioco è mostrato in esso come da tradizione\nResa dai Grandi Miglioramenti dimezzati, e i Grandi Personaggi si generano a velocità dimezzata rispetto al normale
It seems you wish to misdirect your ill fate to others. You're quite pathetic, and I'd lie if I said it was surprising. = Sembra che tu voglia riversare il tuo destino avverso sugli altri. Sei davvero patetico, e mentirei se dicessi che è sorprendente.

William I = Guglielmo I
Hail stalwart Prince William of Orange, liberator of the Netherlands and hero to the Dutch people. It was your courageous effort in the 1568 rebellion against Spanish dominion that led the Dutch to freedom, and ultimately resulted in the Eighty Years' War. Your undertaking allowed for the creation of one of Europe's first modern republics, the Seven United Provinces. You gave your life to the rebellion, falling at the hands of an assassin in 1584, but your death would only serve to embolden the people's charge, and your legacy as "Father of the Fatherland" will stand as a symbol of Dutch independence for all time. = Salve, gagliardo principe Guglielmo d'Orange, liberatore dei Paesi Bassi ed eroe del popolo olandese. Grazie ai tuoi generosi sforzi la ribellione del 1568 ha sinto l'Olanda sul cammino che, attraverso la Guerra degli Ottant'anni, si è concluso con la sua liberazione dal giogo spagnolo. Le tue imprese hanno portato alla creazione di una delle prime repubbliche moderne d'Europa: le Sette Province Unite. Hai dato la tua vita per il paese, cadendo per mano di un assassino nel 1584, ma la tua morte è servita solo a dare ulteriore coraggio al tuo popolo, che ti ricorderà sempre come "Padre della Terra dei Padri" e simbolo dell'indipendenza olandese.
Brave prince, the people again yearn for the wise stewardship your wisdom afforded them. Can you once again secure the sovereignty of your kingdom and lead your people to greatness? Can you build a civilization that stands the test of time? = Coraggioso principe, la tua gente ha ancora sete della guida che così saggiamente hai saputo dargli. Saprai assicurare ancora una volta la sovranità del tuo regno e condurre il tuo popolo alla grandezza? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
