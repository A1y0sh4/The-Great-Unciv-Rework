You are the liege of the viper, the jackal, the vulture, the hyena, the rat—all things hateful and spiteful claim you as their ruler. = Tu sei il signore della vipera, dello sciacallo, dell'avvoltoio, della iena, del ratto - tutte le cose odiose e dispettose ti reclamano come loro sovrano.

Emilio Aguinaldo = Emilio Aguinaldo
For the good of the Philipines, I must wage war on you! = Per il bene dello stato delle Filippine, questa guerra tra noi va dichiarata!
You are making a big mistake. = Stai commettendo un grosso errore.
Will this be my last goodbye to you? = Ebbene, diciamoci pure addio...
Tell me, are you a barbarian, or are you as civilized as we are? = Dimmi, sei un barbaro venuto a spogliare le Filippine delle sue ricchezze, o hai un minimo di civiltà come noi?
Pearl of the Oriental Seas = Perla dei Mari Orientali
Greetings, Emilio Aguinaldo, esteemed leader and first President of the Philippines. Your courage and determination ignited the flames of independence, leading your people in a revolutionary struggle against colonial powers. Under your command, the Philippine Republic was born, marking a new chapter in your nation’s storied history. = Saluti, Emilio Aguinaldo, stimato leader e primo Presidente delle Filippine. Il tuo coraggio e la tua determinazione hanno acceso le fiamme dell'indipendenza, guidando il tuo popolo in una lotta rivoluzionaria contro le potenze coloniali. Sotto il tuo comando è nata la Repubblica delle Filippine, segnando un nuovo capitolo nella storia della tua nazione.
As you rise to lead the Philippines once more, may your strategic acumen and unwavering resolve guide your people to prosperity. Will you harness the spirit of Katipunan to unite your country and assert its place on the world stage? Can you build a civilization that will stand the test of time? = Presidente, possa il tuo acume strategico e il tuo coraggio indomito guidare il tuo popolo alla prosperità mentre torni a guidare le Filippine. Saprai sfruttare lo spirito di Katipunan per unire il tuo Paese e affermare il suo posto sul palcoscenico mondiale? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
