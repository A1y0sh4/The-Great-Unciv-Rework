Welcome, Sir Wilfrid Laurier, Prime Minister of Canada. Your is a free country and freedom is its nationality, and it is your task to ensure that said liberty is preserved. Born from French stock, your tenure as Prime Minister would cement the foundations of Canada as a bastion of freedom in the new world. Under your leadership, your country would expand to the green plains if the West, and the wounds dealt by the rivalries and alliances of the Old World would begin to heal. An intelligent and eloquent politician, your words and deeds would keep Canada hale and whole through the First World War and beyond. = Benvenuto, Sir Wilfrid Laurier, Primo Ministro del Canada. Il tuo è un Paese libero e la libertà è la sua nazionalità, ed è tuo compito garantire che tale libertà sia preservata. Nato da ceppo francese, ti rivelasti un politico eloquente e intelligente, e il tuo mandato come Primo Ministro avrebbe consolidato le fondamenta del Canada come bastione della libertà nel Nuovo Mondo. Sotto la tua guida, il tuo Paese si espande nelle verdi pianure dell'Occidente, e si mantenne sano e integro durante la Prima Guerra Mondiale e oltre. Le ferite inferte dalle rivalità e dalle alleanze del Vecchio Mondo si sarebbero presto rimarginate.
The world is once again plunged into darkness, and Canada herself struggles in the shadows. O' steadfast Prime Minister, will you be for Canada a pillar of fire, guiding the free world with your sunny ways? Will you build a civilization to stand the test of time? = Risoluto Primo Ministro, il mondo è ancora una volta immerso nell'oscurità e il Canada stesso lotta nell'ombra. Sarai per il Canada una colonna di fuoco, pronta a guidare il mondo libero con i tuoi modi solari? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
On behalf of the people of Canada, I offer you this in sign of friendship. = Vi offro questo in segno di amicizia da parte del popolo canadese.
Negotiating with you tests the limits of human patience, and I will no longer indulge your behavior. = Negoziare con voi mette alla prova i limiti della pazienza umana, e io non tollererò più il vostro comportamento.

Blessings and salutations to you, revered Queen Dido, founder of the legendary kingdom of Carthage. Chronicled by the words of the great poet Virgil, your husband Acerbas was murdered at the hands of your own brother, King Pygmalion of Tyre, who subsequently claimed the treasures of Acerbas that were now rightfully yours. Fearing the lengths from which your brother would pursue this vast wealth, you and your compatriots sailed for new lands. Arriving on the shores of North Africa, you tricked the local king with the simple manipulation of an ox hide, laying out a vast expanse of territory for your new home, the future kingdom of Carthage. = Salute e benedizione a te, onorata regina Didone, fondatrice del leggendario regno di Cartagine. Come narra il grande poeta Virgilio, tuo marito Sicheo fu assassinato per mano del suo stesso fratello, re Pigmalione di Tiro, che in seguito cercò di appropriarsi dei tesori che ti appartenevano di diritto. Temendo che non si sarebbe fermato davanti a nulla per appropriarsi di una così grande ricchezza, sei salpata con i tuoi compatrioti verso altri lidi. Giunta sulle rive del Nordafrica, hai beffato un re locale tagliando a strisce una pelle di bue e hai ottenuto un terreno abbastanza ampio da fondare la tua nuova casa, Cartagine, futura capitale di un impero.
Clever and inquisitive Dido, the world longs for a leader who can provide a shelter from the coming storm, guided by brilliant intuition and cunning. Can you lead the people in the creation of a new kingdom to rival that of once mighty Carthage? Can you build a civilization that will stand the test of time? = Astuta e curiosa Didone, il mondo brama una guida che, con la sua scaltrezza e brillante intuizione, lo possa proteggere dalla tempesta in arrivo. Saprai condurre il tuo popolo nella creazione di un nuovo regno all'altezza della potente Cartagine? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Your senators call for our destruction and you dare acclaim them as orators? You walk blind into your destruction. = I tuoi senatori invocano la nostra distruzione e tu osi acclamarli come oratori? Di sicuro stai ciecamente camminando verso la tua rovina e distruzione.
Gain for free the maritime buildings you have avaible in your cities\n+1 [Gold] in capital for every maritime building you have constructed\nCivilian units only pay 1 Movement point when embarking or disembarking = Le tue città ottengono gratis ogni edificio marittimo disponibile\n+1 [Gold] nella Capitale per ogni edificio marittimo costruito\nLe unità civili impiegano solo 1 punto movimento per imbarcarsi e sbarcare
Gain for free the maritime buildings you have available in your cities\n+1 [Gold] in capital for every maritime building you have constructed\nCivilian units only pay 1 Movement point when embarking or disembarking = Le tue città ottengono gratis ogni edificio marittimo disponibile\n+1 [Gold] nella Capitale per ogni edificio marittimo costruito\nLe unità civili impiegano solo 1 punto movimento per imbarcarsi e sbarcare
Maritime buildings are built in half the usual time\n+1 [Gold] in capital for every maritime building you have constructed\nCivilian units only pay 1 Movement point when embarking or disembarking = Puoi costruire edifici marittimi a velocità raddoppiata\n+1 [Gold] nella Capitale per ogni edificio marittimo da te costruito\nLe unità civili pagano 1 solo punto movimento quando si imbarcano o sbarcano
Maritime buildings are built in half the usual time\n+1 [Gold] in capital for every 2 maritime buildings you have constructed\nCivilian units only pay 1 Movement point when embarking or disembarking = Gli edifici marittimi si costruiscono a tempi dimezzati rispetto al solito\n+1 [Gold] nella Capitale per ogni 2 edifici marittimi costruiti\nLe unità civili spendono solo 1 punto movimento quando sbarcano o s'imbarcano

Eternal glory and praise for you, fierce and vengeful Warrior Queen! In a time dominated by men, you not only secured your throne and sovereign rule, but also successfully defied the power of the Roman Empire. After suffering terrible punishment and humiliation at the hand of the Roman invaders, you rallied your people in a bloody and terrifying revolt. Legions fell under your chariot wheels and the city of London burned. While in the end the Romans retained ownership of the isles, you alone made Nero consider withdrawing all troops and leaving Britain forever. = Lode e gloria eterna a te, feroce e vendicativa regina guerriera! In un'epoca dominata dagli uomini, non solo ti sei assicurata il trono e il potere assoluto, ma sei anche riuscita a sconfiggere la potenza dell'impero di Roma. Dopo aver patito orribili sofferenze e umiliazioni per mano degli invasori romani, hai riunito il tuo popoo in una sanguinosa e terrificante rivolta. Le legioni sono cadute sotto le ruote del tuo carro da guerra e la stessa città di Londra è stata messa a ferro e a fuoco. Alla fine i romani hanno mantenuto il controllo delle isole, ma da sola hai spinto Nerone a considerare il ritiro permanente delle sue truppe dalla Britannia.
Oh sleeping lioness, your people desire that you rise and lead them again in the calling that is your namesake. Will you meet their challenge on the open field and lead the Celts to everlasting victory? Will you restore your lands and build an empire to stand the test of time? = Oh leonessa addormentata ma indomita, il tuo popolo desidera che tu sorga e lo conduca ancora a spargere sangue sul campo di battaglia, recuperando le sue terre. Accetterai la sfida e guiderai i Celti a una vittoria eterna? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Caernafon = Caernafon
Saint-Nazarre = Saint-Nazarre
Londonberry = Londonberry
Unimproved Forests yield +1 [Faith]\nUnimproved Forests yield [Science] equal to the [Faith] yield of the tile\nMilitary units in forests heal 10 additional HP per turn = +1 [Faith] dalle Foreste non migliorate, che fruttano anche [Science] pari alla resa in [Fede] nella casella\nLe unità militari nelle foreste guariscono +10 PV aggiuntivi al turno
Unimproved forests yield +1 [Faith]\nUnimproved forests yield [Science] equal to the [Faith] yield of the tile\nImproved forests will yield again the same [Science] and [Faith] in cities following an enhanced religion = Le foreste non migliorate producono +1 [Faith], e [Science] pari alla res in [Faith] nella casella\nQuelle migliorate riprendono la resa in [Science] e [Faith] nelle città che seguono una religione potenziata
Unimproved forests yield +1 [Faith] and +1 [Science]\nImproved forests will yield again the same [Science] and [Faith] in cities following an enhanced religion = +1 [Faith] e [Science] dalle foreste non migliorate\nQuando vengono migliorate, il bonus riprende nelle città che seguono una religione potenziata
Unimproved forests yield +1 [Faith]\nImproved forests yield +1 [Gold] = +1 [Faith] per le Foreste non migliorate; +1 [Gold] quando le migliori
City centers adjacent to forests yield an additional +1 [Faith] before founding a Pantheon\nUnimproved forests yield an additional +1 [Faith], bonus which turns into +1 [Gold] for Improved forests\n+50% construction time for all improvements in Vegetation tiles = +1 [Faith] dai Centri cittadini adiacenti alle Foreste prima di adottare un Pantheon\n+1 [Faith] dalle Foreste non migliorate; quando le si migliorano, il bonus diventa +1 [Gold]\n+50% costruzione per tutti i miglioramenti nelle caselle con vegetazione
The gods clearly hate you, lawless vulture. = È chiaro che gli dei ti odiano, avvoltoio senza legge.

The Blessings of Heaven be upon you. Empress Wu Zetian, most beautiful and haughty ruler of China! Oh great Empress, whose shadow causes the flowers to blossom and the rivers to flow! You are the leader of the Chinese, the oldest and the greatest civilization that humanity has ever produced. China's history stretches back into the mists of time, its people achieving many great things long before the other upstart civilizations were even conceived. China's contributions to the arts and sciences are too many and too wondrous to do justice to - the printing press, gunpowder, the works of Confucius - these are but a few of the gifts China has given to an undeserving world! = Che la benedizione del cielo scenda su di te, imperatice Wu Zetian, la più bella e la più fiera tra tutti i sovrani della Cina! O grande imperatrice, la cui sola ombra è sufficiente a far sbocciare i fiori e far scorrere i fiumi! Tu sei a capo della civiltà cinese, la più antica e grandiosa mai prodotta dall'uomo. La storia della Cina si perde nelle nebbie del tempo e il suo popolo ha goduto di molte scoperte e invenzioni prima ancora che altre imberbi civiltà nascessero. Il contributo cinese alle arti e alle scienze è tale da non potervi rendere giustizia: la stampa, la polvere da sparo, le opere di Confucio... questi non sono che alcuni dei doni che la Cina ha offerto a questo mondo ingrato!
You, great Queen, who, with cunning and beauty, rose from the position of lowly concubine to that of Divine Empress - your people call out to you to lead them! Great China is once again beset on all sides by barbarians. Can you defeat all your many foes and return your country to greatness? Can you build a civilization to stand the test of time? = O grande imperatrice, tu che, con astuzia e bellezza, da semplice concubina ascendesti al rango di divina imperatrice, ascolta il popolo che vuole essere guidato da te! La grande Cina è ancora una volta circondata da barbari. Riuscirai a sconfiggere i tuoi numerosi nemici e a riportare il tuo paese alla grandezza? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Great General's Strength bonus is doubled\nGain the normal amount of Great General points when not at war\nSpies operate if they were one level more experienced = Bonus dai Grandi Generali raddoppiato\nPunti Grande Generali raddoppiati quando non sei in guerra\nLe spie operano come se fossero di un livello superiore
Great General's Strength bonus is doubled\nSpies operate if they were one level more experienced = Doppio bonus in Forza dai Grandi Generali\nLe spie operano a un livello superiore rispetto al normale
Great General's Strength bonus is doubled\nSpies operate if they were one level more experienced (when espionage is enabled)\n+10% to Flank Attack bonuses for Military units (when espionage is disabled) = Bonus dai Grandi Generali raddoppiato\nLe spie operano a un livello superiore (quando lo spionaggio è abilitato)\n+10% bonus Attacco ai fianchi per le unità militari (quando lo spionaggio è disabilitato)
Great General's Strength bonus is doubled and its effect has +1 additional range\nSpies operate if they were one level more experienced (when espionage is enabled)\n+20% to Flank Attack bonuses for Military units (when espionage is disabled) = L'effetto dei Grandi Generali raddoppia di effetto in termini di Forza e ha un raggio aumentato di 1\nLe Spie operano a un livello superiore al normale (se lo spionaggio è attivo)\n+20% bonus d'attacco ai fianchi per le unità militari (se lo spionaggio NON è attivo)
Your words are sharp. But there are other things that are sharper. = Le tue sono parole taglienti. Ma molte cose lo sono di più.

Honor and glory be yours, Harald Bluetooth Gormsson, mighty heir of King Gorm of the Old and Thyra Dannebod. Not only were you victorious on the battlefield against the armies of Norway, you also completed massive construction project across the land - numerous Ring Fortresses to protect the populace from invasion and internal strife. You successfully drove off waves of German settlers in 983 AD and sheltered your kingdom from unwanted foreign influence. = A te l'onore e la gloria, Harald Gormsson Dente Blu, potente erede di re Gorm il Vecchio e di Thyra Dannebod. Tu hai sconfitto sul campo gli eserciti della Norvegia e hai completato la costruzione di numerose, enormi fortezze circolati in tutte le tue terre per proteggere la popolazione dalle invasioni e dalle tensioni interne. Nel 983 d.C. hai sconfitto con successo diverse ondate di invasori dalla Germania, chiudendo i confini del tuo regno a ogni influenza esterna.
Stalwart Viking, the time for greatness is upon you once more. You are called to rise up and lead your people to renewed power and triumph! Will you make the world shudder once more at the very thought of your great armies of Northsmen? Will you let the Viking battle cry ring out across the crashing waves? Will you build a civilization to stand the test of time? = Gagliardo vichingo, il tempo della grandezza sta ritornando. Sei chiamato a sollevarlo il tuo popolo e guidarlo ancora una volta verso il potere e il trionfo! Il mondo tornerà a tremare al solo pensiero delle scorribande degli Uomini del Nord? Il grido di battaglia dei vichinghi riecheggerà ancora una volta tra i marosi? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Tunsbers = Tunsbers
All units embark and disembark using only 1 movement point\nMilitary units don't use movement points to pillage and don't suffer from water attack maluses\nAll units can enter Ocean tiles upon entering the Medieval era = Le unità usano solo un punto movimento per imbarcarsi e sbarcare\nLe unità militari possono saccheggiare senza costi in Movimento e sono immuni ai malus dagli attacchi anfibi\nLe unità possono attraversare gli Oceani a partire dall'Epoca Medievale
There will be no place for you at Odin's place. You're nothing but a detestable human. = Non ci sarà posto per te nella casa di Odino. Non sei altro che un essere umano detestabile.

We greet thee, oh great Ramesses, Pharaoh of Egypt, who causes the sun to rise and the Nile to flow, and who blesses his fortunate people with all the good things of life! Oh great lord, from time immemorial your people lived on the banks of the Nile river, where they brought writing to the world, and advanced mathematics, sculpture, and architecture. Thousands of years ago they created the great monuments which still stand tall and proud. = Salute a te, o grande Ramses, faraone d'Egitto, che fai sorgere il sole e scorrere il Nilo e che benedici il suo popolo con ogni cosa buona della vita! O grande capo, da tempo immemore il tuo popolo ha vissuto lungo le sponde del fiume Nilo, dove ha concepito la scrittura e approfondito la matematica, la scultura e l'architettura, creando migliaia di anni fa i grandi monumenti che nacora oggi si erigono alti e fieri.
Oh, Ramesses, for uncounted years your people endured, as other petty nations around them have risen and then fallen into dust. They look to you to lead them once more into greatness. Can you honor the gods and bring Egypt back to her rightful place at the very center of the world? Can you build a civilization that will stand the test of time? = O Ramses, il tuo popolo è sopravvissuto al tempo, mentre altre insignificanti nazioni sono cresciute e sono morte. Adesso, con la benedizione di Amon-Ra, il tuo popolo vuole che lo guidi verso la grandezza. Saprai onorare gli dèi e a ridare all'Egitto il ruolo che merita, quello di centro del mondo? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Gain 30% of the cost of a World Wonder as [Culture] and [Science] (modified by game speed)\n+1 [Food], +1 [Production] in cities on River tiles = Ottieni [Culture] e [Science] pari al 30% del costo di una Meraviglia Mondiale (a seconda della velocità di gioco)\n+1 [Food] e [Production] nelle città sui Fiumi
Gain 33% of the cost of a World Wonder as [Culture] and [Science] (modified by game speed)\n+1 [Food], +1 [Production] in cities on River tiles = Ottieni [Culture] e [Science] pari al 33% dei costi di una Meraviglia Mondiale (a seconda della velocità di gioco)\n+1 [Food] e [Production] nelle città poste sui fiumi
Gain 33% of the cost of a World Wonder as [Culture] and [Science] (modified by game speed)\n+1 [Production] in cities on River tiles = Ottieni [Culture] e [Science] pari al 33% del costo di una Meraviglia Mondiale (a seconda della velocità di gioco)\n+1 [Production] nelle città poste sui fiumi
Did a jackal bark just now? = Credo di aver udito uno sciacallo abbaiare...

Praises upon her serene highness, Queen Elizabeth Gloriana. You lead and protect the celebrated maritime nation of England. England is an ancient land, settled as early as 35,000 years ago. The island has seen countless waves of invaders, each in turn becoming a part of the fabric of the people. Although England is a small island, for many years your people dominated the world stage. Their matchless navy, brilliant artists and shrewd merchants, giving them power and influence far in excess of their mere numbers. = Lode a Sua Serena Altezza, regina Elisabetta Gloriana, che guida e protegge la celebre nazione marittima d'Inghilterra. L'inghilterra è una terra antica, con insediamenti risalienti fino a 35.000 anni fa e oggetto di innumerevoli ondate di invasori, ciascuna delle quali ha poi contribuito a definire il carattere della popolazione. Anche se l'Inghilterra è un'isola poco estesa, per anni la sua gente ha dominato la scena mondiale: la sua flotta ineguagliabile, i suoi brillanti artisti e l'astuzia dei suoi mercanti le hanno conferito un potere e un'influenza che andavano ben al di là dei semplici numeri.
Queen Elizabeth, will you bring about a new golden age for the English people? They look to you once more to return peace and prosperity to the nation. Will you take up the mantle of greatness? Can you build a civilization that will stand the test of time? = Regina Elisabetta, farai tornare il popolo inglese alla sua età dell'oro? Esso si rivolge a te per ritrovare la pace e la prosperità di un tempo. Accetterai di indossare il mantello della grandezza? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Military units are +15% stronger when fighting on water or on foreign continents\nResources on water or on foreign continents yield an additional +1 [Gold]\nRare features in water tiles yield an additional +1 [Gold] = +15% Forza per le unità militari in acqua o sui continenti stranieri\n+1 [Gold] per le risorse anfibie o sui continenti stranieri, e anche per le caratteristiche rare anfibie
Military units are +10% stronger when fighting on water or on foreign continents\nResources on water or on foreign continents yield an additional +1 [Gold]\nRare features in water tiles yield an additional +1 [Gold] = +10% Forza per le unità militari quando combattono in acqua o su continenti stranieri\n+1 [Gold] dalle risorse anfibie o sui continenti stranieri (e +1 [Gold] se sono risorse rare anfibie)
Wit warns me to shun such snares and falsehoods that now flow so freely. = L'ingegno mi consiglia di evitare insidie ​​e falsità che ora circolano così liberamente.

Blessings be upon you, honorable and righteous Emperor of Ethiopia, Haile Selassie. Your legacy as one of Ethiopia's greatest rulers, and as the spiritual leader to the Rastafarian movement, is outshone only by the influence you had on diplomacy and political cooperation throughout the world. In introducing Ethiopia's first written constitution, you planted the seeds of democracy that would take root over the coming years, and your infinitely wise grasp of global affairs secured Ethiopia's place as a charter member of the United Nations. Spearheading efforts to reform and modernize the nation during your reign, you changed the course of Ethiopian history forever = Molte benedizioni su di te, onorevole e retto imperatore dell'Etiopia, Hailé Selassié. La tua figura di grande monarca e di capo spirituale del movimento rastafariano è superata solo dall'influenza che hai saputo esercitare sulla scena politica e diplomatica mondiale. Introducendo la prima costituzione scritta in Etiopia hai piantato i semi della democrazia, semi che avrebbero messo radici negli anni successivi. La tua saggezza e comprensione profonda degli affari del mondo hanno assicurato all'Etiopia un posto come membro delle Nazioni Unite. Durante il tuo regno ti sei adoperato per riformare e modernizzare la nazione, segnando per sempre la storia etiope.
Revered king, your composed demeanor once protected the people from the many conflicts that plague the nations of men, and the kingdom looks to you to assure peace once again. Will you lead the people with courage and authority, moving forward into a new age? Will you build a civilization that stands the test of time? = Onorato re, in passato la tua condotta misurata ha già protetto il popolo dai molti conflitti che tormentano le nazioni degli uomini. Oggi il regno ti chiede di assicurare ancora una volta la pace. Onorerai la tua gente con coraggio e autorità, conducendolo in una nuova epoca? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
+1 [Science] in all cities within 3 tiles of a [Holy site] (+1 additional [Science] per passed era)\n+20% Strength for Military units within 3 tiles of a [Holy site] in Friendly Land tiles = +1 [Science] in tutte le città entro 3 caselle da [Holy site] (e +1 [Science] aggiuntiva per epoca)\n+20% Forza per le unità militari entro 3 caselle da [Holy site] in territorio amico
