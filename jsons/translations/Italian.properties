Oh Great Cunhambebe of the Tupinamba tribe, unifier of the Tupi people, you led your people in the great Tamoyo Confederation against the Portuguese colonists. Your people settled in the Amazon Rainforest, and managed to become one of the main civilizations in the area. Sharing many cultural traditions, the Tupi managed to generate many different tribes: the Tupiniquim, the Tupinamba, the Potiguara, the Tabajara, the Caetes, the Temimino, the Tamoios, and many others, each with their own unique language. Your people unified in the fight against the European colonization. You also managed to sign an alliance with France, making it possible to fight off the enemies of your lands. = Salute a te, o grande Cunhambebe della tribù dei Tupinamba e unificatore del popolo Tupi, colui che lo guidò nella grande Confederazione Tamoyo contro i coloni portoghesi. Insediatosi nelle foreste amazzoniche, il tuo popolo riuscì a diventarne l'egemone, e condivise molte tradizioni culturali con tante tribù diverse, come i Tupiniquim, i Tupinamba, i Potiguara, i Tabajara, i Caetes, i Temimino, i Tamoios e tante altre, ognuna con la propria lingua. Riuscisti a unificare il tuo popolo contro i coloni europei, e a tale scopo ti alleasti con la Francia, rendendo possibile respingere i nemici dalle tue terre.
Oh Great Chief of the Tamoyo, your people still wander the Amazon, still remembering your bravery and cunning in diplomacy. Will you once again lead them together? Will you build a Civilization that can stand the test of time? = O Grande Capo dei Tamoyo, il tuo popolo vaga per l'Amazzonia, ricordando ancora la tua tenacia in guerra e la tua astuzia nella diplomazia. Saprai guidarlo ancora una volta alla grandezza? Riuscirai a plasmare una civiltà, in grado di superare la prova del tempo?
The winds of war fall upon you! The time to look for new fresh sacrifical victims has come. = I venti della guerra soffiano a tuo sfavore! È giunto il momento di cercare nuove vittime sacrificali!
You, vile creature, will be our new sacrifical victim. = Bene. Tu, o vile creatura, sarai la nostra nuova vittima sacrificale.
Not even with our confederation, did we manage to defeat you... = Nemmeno uniti in un'unica confederazione, siamo riusciti a batterti...
Welcome stranger, I'm Quonambec of the Tupinamba. Come and join us at our celebrations in the Maloca. = Benvenuto, straniero. Sono Quonambec dei Tupinamba. Vieni, e celebra con noi la festa del Maloca.
Are you here to offer yourself as a sacrifice? = Sei qui per farti immolare, per caso?
Here is a fair offer from the Tupinamba: = Ecco una bella offerta dai Tupinamba:
The Tamoyo Confederation = Confederazione Tamoyo
+3% [Production] when constructing Military units per number of owned cities, when at war\nMilitary units gain +100% XP when fighting in Friendly Land tiles = +3% [Production] per città in tuo possesso quando addestri unità militari e sei in guerra\nDoppia esperienza alle unità militari quando combattono in Terra amica
You do realize that you're inviting yourself to us as our new sacrificial victim, right? = Ti rendi conto che ti stai presentando a noi come la nostra nuova vittima sacrificale, vero?
