Gain an additional +1 [Gold] and +1 [Science] per enacted policy every time you enter a new era\nPolicies are adopted 10% faster\nSpies operate if they were one level more experienced when rigging elections in City-States (when espionage is enabled)\nResting point for Influence with City-States is increased by 10 (when espionage is disabled) = +1 [Gold] e [Science] per ogni politica sociale adottata ad ogni epoca in cui entri, e -10% costi in Cultura per le Politiche\nLe spie operano con un livello superiore quando dirottano le elezioni nelle Città-Stato (a spionaggio abilitato)\nIl punto neutro d'Influenza per le Città-Stato sale di 10 (quando lo spionaggio è disabilitato)
Gain an additional +1 [Gold] and +1 [Science] per enacted policy every two eras you pass\nPolicies are adopted 10% faster when above 10 [Happiness]\nSpies operate if they were one level more experienced when rigging elections in City-States (when espionage is enabled)\nResting point for Influence with City-States is increased by 10 (when espionage is disabled) = +1 [Gold] e [Science] per ogni politica sociale attiva ogni due epoche trascorse\n-10% tempi di adozione delle politiche sociali quando la [Happiness] è superiore a 10\nLe spie operano a un livello superiore quando dirottano le elezioni nelle Città-Stato (se lo spionaggio è attivo)\nIl punto minimo d'Influenza con le Città-Stato aumenta di 10 (se lo spionaggio NON è attivo)
There is no beauty in you at all. = In te non c'è alcuna traccia di bellezza.

Welcome, O divine Montezuma! We grovel in awe at your magnificence! May the heaven shower all manner of good things upon you all the days of your life! You are the leader of the mighty Aztec people, wandering nomads from a lost home in the north who in the 12th century came to live in the mesa central in the heart of what would come to be called Mexico. Surrounded by many tribes fighting to control the rich land surrounding the sacred lakes of Texcoco, Xaltocan and Zampango, through cunning alliances and martial prowess, within a mere two hundred years, the Aztecs came to dominate the Central American basin, ruling a mighty empire stretching from sea to sea. But the empire fell at last under the assault of foreign devils - the accursed Spaniards! - wielding fiendish weapons the likes of which your faithful warriors had never seen. = Benvenuto, o divino Montezuma! Ci prostriamo stupefatti dinanzi alla tua magnificenza! Che i cieli ti sommergano di ogni genere di beni per tutti i giorni della vita! Tu sei il capo del potente popolo azteco, che vagò nomade dopo aver abbandonato la propria terra nel nord stabilendosi nel XII secolo nella Mesa Central, nel cuore di quello che poi sarà chiamato Messico. Circondato da tribù in lotta per il controllo delle ricche terre intorno ai sacri laghi Texcoco, Xaltocan e Zumpango, grazie ad astute alleanze e alla loro prodezza militare, in soli duecento anni gli Aztechi giunsero a dominare il bacino dell'America centrale, ponendosi a capo di un impero che si estendeva da oceano a oceano. Il loro regno alla fine cadde sotto l'assalto di diavoli stranieri: i maledetti spagnoli, le cui armi, i tuoi fedeli guerrieri, non avevano mai visto prima.
O great king Montezuma, your people call upon you once more, to rise up and lead them to glory, bring them wealth and power, and give them dominion over their foes and rivals. Will you answer their call, glorious leader? Will you build a civilization that stands the test of time? = O grande re Montezuma! La tua gente desidera risollevarsi e vuole che sia tu a guidarli verso la gloria! Porta loro ricchezza e potenza e falli dominare sui rivali e sui nemici! Risponderai alla chiamata, glorioso leader? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Units heal 25 HP if they kill a unit or capture a city\nUpon killing a unit gain 50% of its Strength as [Faith]\nUpon capturing a city receive immediatly double its [Production] output as [Faith] = Le unità guariscono 25 HP quando eliminano un nemico o conquistano una città\nQuando elimini un nemico, ottieni [Faith] pari al 50% della sua Forza\nQuando conquisti una città, ricevi [Faith] pari al doppio della sua [Production]
Those who are afraid speak loudest. You clearly fear us. = Colui che ha paura parla più forte. È chiaro che tu hai paura di noi.

May the blessings of heaven be upon you, O great Nebuchadnezzar, father of mighty and ancient Babylon! Young was the world when Sargon built Babylon some five thousand years ago, long did it grow and prosper, gaining its first empire the eighteenth century BC, under godlike Hammurabi, the giver of law. Although conquered by the Kassites and then by the Assyrians, Babylon endured, emerging phoenix-like from its ashes of destruction and regaining its independence despite its many enemies. Truly was Babylon the center of arts and learning in the ancient world. O Nebuchadnezzar, your empire endured but a short time after your death, falling to the mighty Persians, and then to the Greeks, until the great city was destroyed by 141 BC. = Che la benedizione del cielo scenda su di te, o grande Nabucodonosor, padre dell'antica e potente Babilonia! Giovane era il mondo quando Sargon eresse Babilonia, quasi cinquemila anni fa. A lungo crebbe e prosperò, dando vita al suo primo impero nel XVIII secolo a.C. sotto il divino Hammurabi, il legiferatore. Anche se conquistata prima dai Cassiti e poi dagli Assiri, Babilonia resistette, riemergendo come una fenice dalle ceneri della distruzione e riguadagnando la propria indipendenza nonostante i suoi molti nemici. Babilonia era davvero il centro delle arti e della conoscenza nel mondo antico!
But is Babylon indeed gone forever, great Nebuchadnezzar? Your people look to you to bring the empire back to life once more. Will you accept the challenge? Will you build a civilization that will stand the test of time? = O Nabucodonosor, il tuo impero non durò molto dopo la tua dipartita, cadendo preda dei potenti Persiani prima e dei Greci dopo, finché la tua grande città non venne distrutta nel 141 a.C. Ma davvero Babilonia è sparita per sempre, o grande Nabucodonosor? Il tuo popolo desidera che tu riporti in vita l'impero ancora una volta! Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Gain 1 free random Technology upon entering a new era\nGain for free in Capital the cheapest available building for every Stat\nGain -10% [Science] per turn = Ottieni gratuitamente una nuova tecnologia casuale quando entri in una nuova epoca\nLa Capaitale ottiene gratuitamente l'edificio più economico disponibile per ogni Statistica\n-10% [Science] al turno
I see, you're just a phantom, not a real man. = Capisco... sei solo un fantasma, non un vero essere umano.

Pedro II = Pedro II
I have to do this, for the sake of progress if nothing else. You must be opposed! = Devo oppormi a te, anche solo per il bene del progresso: è mio dovere!
You can see how fruitless this will be for you... right? = Tu sai quanto questa guerra servirà a poco per te... vero?
May God grant me these last wishes - peace and prosperity for Brazil. = Che Dio esaudisca questi miei ultimi desideri: pace e prosperità per il Brasile.
I am Pedro, Emperor of Brazil. I have little time for pleasantries, what brings you here? = Sono Pedro, Imperatore del Brasile. Ho poco tempo per i convenevoli: cosa ti porta qui?
Should we prosper through commerce? = Perché non prosperiamo insieme tramite il commercio?
Hello. = Salve.
Amazon = Amazzonia
All Hail his most respected and magnanimous Emperor, Pedro II of Brazil. It was with great insight and unshakeable dignity that you ruled the Brazilian empire for over 50 years, ushering in a time of lasting peace and prosperity. Your reputation as a stern, but fair leader was never blemished by controversy, as your unwavering dedication to the people of Brazil provided hope and established the kingdom's position in South America. Your scholarly pursuits and staunch defense of freedom of speech led to the creation of several institutions of higher learning, strengthening Brazil's sense of national identity. = Onore al rispettato e magnanimo imperatore, Pedro II del Brasile. Hai regnato sull'impero brasiliano per più di 50 anni con grande saggezza e imperturbabile dignità, instaurando un periodo di pace duratura e prosperità. La tua reputazione di leader duro ma equo non è mai stata macchiata da alcuna controversia e la tua incrollabile dedizione verso il popolo brasiliano ha dato speranza alla gente di rafforzare la posizione del tuo regno nel Sudamerica. I tuoi studi eruditi e la tua ferma difesa della libertà di parola hanno favorito la creazione di diverse istituzioni per l'istruzione superiore, rafforzando l'identità nazionale brasiliana.
Revered Emperor Pedro, your people long for a return to the peaceful days when you walked among them, hearing their stories and reassuring them of a bright future. Will you once again lead your kingdom to prosperity? Can you build a civilization that stands the test of time? = Onorato imperatore Pedro, i tuoi sudditi desiderano ritornare ai giorni pacifici in cui camminavi tra di loro, ascoltando le loro storie e assicurando loro un futuro luminoso. Riporterai il tuo regno alla prosperità? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
