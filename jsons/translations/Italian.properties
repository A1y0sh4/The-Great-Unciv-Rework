Your words are foul. You have a rot at your center. The only way to cleanse that is to cut it out. = Le tue parole sono disgustose. Hai una putrefazione dento di te. L'unico modo per purificarla è sradicarla.

Cree = Cree
Poundmaker = Poundmaker
I do not care to inflict the terrors of war upon you, but justice requires it. = Non è mio interesse contaminare la tua terra dei terrori della guerra, ma questo è quanto richiede la giustizia.
You could have found another way. Now, your regrets will be measured in blood. = Potevi trovare un'altra strada. Ma ora i tuoi rimpianti saranno misurati col sangue.
Had I wanted war, I would not be here now. You did not catch me. I gave myself up. = Se avessi voluto la guerra, non sarei stato qui adesso. Non sei stato tu a catturarmi; io mi sono arreso.
I am Poundmaker, and I represent the Cree. May there always be peace between us. = Sono Poundmaker, e rappresento il popolo dei Cree. Possa la pace scendere su di noi ogni giorno.
Is the following trade of interest to you? = Questa proposta ti allieta?
Nîhithaw = Nîhithaw
Camps and Pastures base yield becomes [Food]\nGain 50% more yield from Golden Age bonuses = La resa base di Campi e Pascoli diventa [Food]\n+50% resa dai bonus dell'Età dell'Oro
Greetings, Poundmaker, Chief of the Plains Cree. You lived in a time of great upheaval, of change and hardship. As a child, you were raised by Chief Crowfoot of the Blackfoot, who had always been your enemies. As your grew, you learned the ways of the Blackfoot so that peace could be made between them and your people. As a man, you faced an even greater diplomatic challenge: the Canadians. As your people faced possible starvation, you kept a steady hand and a cool head when negotiating for better terms of peace, for fair deals, and for aid. When some of your people attacked the Canadians, you chose prison over war, laying down your life to prevent the Canadians from branding the Cree as enemies - even though you were innocent of any wrong doing. Your wise actions and good counsel saved your people both from starvation adn war with Canada, but at great cost. = Saluti, Poundmaker, capo dei Cree delle Pianure. Tu hai vissuto in un periodo di grandi sconvolgimenti, cambiamenti e difficoltà. Da bambino, fosti allevato dal capo Crowfoot dei Blackfoot, che erano sempre stati tuoi nemici. Crescendo, imparasti le usanze dei Blackfoot in modo che vi fosse la pace tra loro e il tuo popolo. Da uomo, affrontasti una sfida diplomatica ancora più grande: il Canada. Mentre il tuo popolo affrontava lo spettro della carestia, tu mantenesti la mano ferma e i nervi saldi negoziando per ottenere migliori condizioni di pace, accordi equi e aiuti. Quando alcuni del tuo popolo attaccarono i canadesi, tu scegliesti la prigione anziché la guerra, sacrificando la tua vita per impedire ai canadesi di marchiare i Cree come nemici, anche se eri innocente di qualsiasi illecito. Le tue azioni sagge e i tuoi buoni consigli salvarono il tuo popolo sia dalla carestia che dalla guerra con il Canada, ma a caro prezzo.
Great Poundmaker, your wisdom and firm hand are needed once again. If your people are to thrive in these new lands, they will need to seek peace and friendship among the many diverse peoples around them. Will you rise up and make the Cree a great nation, spanning many lands? Will you bring peace between the quarelling tribes? Will you build a civilization that will stand the test of time? = Grande Poundmaker, la tua saggezza e la tua mano ferma sono di nuovo necessarie per il tuo popolo; se esso vuole prosperare in queste nuove terre, dovrà cercare pace e amicizia tra i tanti popoli diversi che lo circondano. Ti ergerai per rendere i Cree una grande nazione, che abbraccia molte terre? Porterai la pace tra le tribù in conflitto? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Upon building Camps and Pastures, gain control of their surrounding tiles\nGain 50% more yield from Golden Age bonuses = Quando costruisci Campi e Pascoli, ottieni il controllo delle caselle circostanti\n+50% resa dai bonus dell'Età dell'Oro
Upon building Camps and Pastures, gain control of their surrounding tiles\nGain 20% more yield from Golden Age bonuses = Quando costruisci Campi e Pascoli, ottieni il controllo delle caselle circostanti\n+20% resa dai Bonus dell'Età dell'Oro
Your word is worthless, your people go astray, and you have no friends who will stand by you. = Il tuo verbo è inutile, il tuo popolo è senza guida, e tu non hai amici che possano stare al tuo fianco.

Mapuche = Mapuche
May the Gods shower you with every kind of blessing, oh Toqui of Toquis, Lautaro, leader of the Wallmapu, the Mapuche people, by the wise election of the Lonkos. The Mapuche are the union of Picunches, Huilliches, Moluche and Nguluche from Araucanía. Despite their lack of state organization, your people successfully repelled many invasions from the Inca, led by the Sapa Inca Yupac Yupanqui. They won the bloody three-day confrontation known as the Battle of the Maule, stopping them at the Maule River, and behind the Rapel and Cachapoal rivers they established a fortified border. Your people also repelled the Spanish in the late 16th century so effectively that there were areas to which Europeans did not return until late in the 19th century. One of the main geographical boundaries was the  Bío-Bío river, which they used as a natural barrier to Spanish and Chilean incursion. = Possano gli Dei colmarti di ogni tipo di benedizione, oh Toqui dei Toquis, Lautaro, capo dei Wallmapu, il popolo dei Mapuche, per la saggia elezione dei Lonko. I Mapuche sono l'unione delle tribù Picunche, Huilliche, Moluche e Ngoluche dell'Araucanía. Nonostante la mancanza di organizzazione statale, il tuo popolo respinse con successo numerose invasioni degli Inca, guidati dal Sapa Inca Yupac Yupanqui, e vinse la sanguinosa battaglia del Maule, durata tre giorni, fermandoli sull'omonimo, e dietro i fiumi Rapel e Cachapoal stabilì un confine fortificato. Il tuo popolo respinse inoltre gli spagnoli alla fine del XVI secolo in modo così efficace che vi furono aree in cui gli europei non tornarono fino alla fine del XIX secolo. Uno dei principali confini geografici era il fiume Bío-Bío, che usava come barriera naturale alle incursioni spagnole e cilene.
Oh great Toqui, you did not just liberate the Mapuche - you inspired them to free themselves. But now your people still fight for their right to their lands. Will you stand with the Mapuche, axe-bearer, and cast a singular shadow against all who would dare to threaten them? Can you build a civilization that will stand the test of time? = Oh grande Toqui, non hai solo liberato i Mapuche: li hai ispirati a liberarsi da soli. Ma ora il tuo popolo continua a lottare per il diritto alle proprie terre. Starai con i Mapuche, portatori d'ascia, e proietterai un'unica ombra contro tutti coloro che osano minacciarlo? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Lautaro = Lautaro
It comes to war. Mapuche shall use your own weapons against you! = Giunge infine l'ora della guerra. I Mapuche useranno ogni loro arma contro di te!
I knew you could not be trusted! We have long prepared for this war. Have you? = Sapevo che di te non ci si poteva fidare! Ci siamo preparati a lungo per questa guerra! E tu?
We resisted to the last, but it was too late… too late. = Abbiamo resistito fino all'ultimo, ma è stato tutto inutile... ed è stato troppo tardi.
I am Lautaro, the Swift Hawk. Mapuche honor me with respect. Will I see the same from you? = Io sono Lautaro, l'Aquila Sfuggente. I Mapuche mi onorano e mi rispettano. Posso aspettarmi lo stesso da te?
Toqui = Toqui
+1% Strength for Military units for every Happiness (up to +15%)\nPopulation doesn't generate additional unhappiness when at war = +1% Forza per punto Felicità per le unità militari (massimo +15%)\nNessuna Infelicità aggiuntiva dalla Popolazione quando sei in guerra
Your deeds reflect your true nature. The Mapuche cannot stand you! = Le tue azioni riflettono la tua vera natura. I Mapuche non ti sopportano!

Morocco = Marocco
Ahmad al-Mansur = Ahmad al-Mansur
The people of Morocco await your guidance, great Sultan Ahmad al-Mansur of the Saadi Dynasty. Well known for your skill as both a negotiator and a diplomat, your careful words allowed the forging of new alliances, securing the sovereignty of your nation and its people for decades. And still, when words failed, you found equal success in conquest, leading the Moroccan armies to victory on the battlefield while greatly expanding the grasp of your empire. = Il popolo del Marocco attende la tua guida, grande sultano Ahmad al-Mansur della dinastia saadita. Famoso per la tua abilità di negoziatore e diplomatico, con le tue accorte parole hai saputo forgiare nuove alleanze, assicurando per decenni la sovranità della nazione e della sua gente. Quando le parole hanno fallito, hai riportato analoghi successi in battaglia, conducendo gli eserciti marocchini alla vittoria sul campo ed espandendo notevolmente i confini dell'impero.
Wise and respected Sultan, the people look to you for leadership. Can your diplomacy match that of your rivals, or will you meet them sword in hand? Your once great kingdom years for that former glory - can you build a civilization that stands the test of time? = Saggio e onorato sultano, il popolo ti implora di guidarlo. La tua abilità diplomatica sarà pari a quella dei tuoi rivali, o dovrai affrontarli con la spada in pugno? Il tuo regno desidera tornare ai fasti del passato: riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
The gain from the war, what will you get out of it? = Spero di ottenere qualcosa da questa guerra, per quanto mi dispiaccia combatterla...
Shame on you, using violence which doesn't solve anything. = Vergognati! Usare la violenza non risolverà nulla!
The gain is having a clean system from corruption. = Ecco perché preferisco il tavolo dei negoziato al campo di battaglia... Lascia che ti dia un ultimo insegnamento: un buon governatore sa ottenere un sistema pulito dalla corruzione.
I am the Sultan of Marrakesh al-Mansur, in the name of my people I welcome you! = Saluti a te, viaggiatore! Sono il sultano Ahmad a-Mansur del Marocco, e ti do il benvenuto a nome del mio popolo. In cosa posso servirti?
Gateway to Africa = Cancelli per l'Africa
Gain an additional +2 [Gold] and +1 [Culture] in all cities connected to capital\nTrade routes are 25% cheaper to maintain = +2 [Gold] e +1 [Culture] in tutte le città connesse alla Capitale\n-25% costi di mantenimento per le rotte commerciali
Gain an additional +1 [Gold] and +1 [Culture] in all cities connected to capital\nTrade routes are 33% cheaper to maintain = +1 [Gold] e [Culture] in tutte le città connesse alla Capitale\n-33% costi di mantenimento per le rotte commerciali
Gain an additional +1 [Gold] and +1 [Culture] in all cities connected to capital\nTrade routes are 25% cheaper to maintain\nRoads and Railways are 25% faster to build = +1 [Gold] e [Culture] in tutte le città connesse alla Capitale\n-25% costi di mantenimento per le rotte commerciali\n+25% velocità di costruzione per Strade e Ferrovie
Marrakech = Marrakesh
Tangier = Tangeri
I came hopeful that we can reach an agreement. = Vengo al tuo cospetto con la speranza di raggiungere un accordo.
I spit at the sound of your name, I spit at your dark deeds, and I spit at your many crimes. = Al suono del tuo nome vi sputo. Alle tue azioni oscure vi sputo. E ai tuoi numerosi crimini vi sputo.

Buganda = Buganda
Suna II = Suna II
Hail to you, Ssekabaka Ssuuna II, Kabaka king of the Buganda people. You ascended the throne at the age of twelve, and your rule is said to be ruthless, as shown by the execution of almost all of your brothers by your order. You also enforced laws for your people, including the following for sanitary standards within the capital, and included foreign trade from Zanzibaris and Arabs, enriching your kingdom. You were also a stead fast man, both in body and spirit: you survived a lightning strike, and the continued campaigns in your name, thanks to your expanded fleed, led to bigger domains around Lake Nnalubaale, or as we call it today Lake Victoria. = Salute a te, Ssekabaka Ssuuna II, re Kabaka del popolo Buganda. Tu sei salito al trono all'età di dodici anni e si dice che il tuo sia stato un regno brutale, come dimostra l'esecuzione di quasi tutti i tuoi fratelli per tuo ordine. Hai anche fatto rispettare le leggi per il tuo popolo, comprese quelle relative agli standard sanitari all'interno della capitale, e hai incluso il commercio estero con zanzibarini e arabi, arricchendo il tuo regno. Sei stato anche un uomo saldo, sia nel corpo che nello spirito: sei sopravvissuto a un fulmine e le continue campagne in tuo nome, grazie alla tua estesa flotta, hanno portato a domini più ampi intorno al lago Nnalubaale, o come lo chiamiamo oggi lago Vittoria.
O brave and ruthless Kabaka, today the kingdom is absorbed in a nation called Uganda, but the ancient capital of Kampala, around which Buganda was built, is still the center of your people. Will you lead your kingdom to further greatness? Will you take the mantle and answer your people's call? Can you build a civilization that will stand the test of time? = O prode e spietato Kabaka, oggi il regno è assorbito da una nazione chiamata Uganda, ma l'antica capitale Kampala, attorno alla quale fu costruito il Buganda, è ancora il centro del tuo popolo. Condurrai il tuo regno verso ulteriori glorie? Risponderai alla chiamata del tuo popolo indossando il mantello del comando? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
You think I'll take this threat lightly? Imbecile! = Credi che prenderò alla leggera questo insulto? Sei un imbecille!
I still have 6 palaces and 148 wives. What do you have? = Io ho ancora 6 palazzi e 148 mogli. Tu cos'hai?
I am Ssekabaka Ssuuna II, Kabaka of Buganda. As you can see, my power here is absolute. = Io sono Ssekabaka Ssuuna II, Kabaka del regno di Buganda. Come puoi ben vedere, il mio potere qui è assoluto.
Your mere existence is an insult! Run while you still can! Run before my armies! = La tua semplice esistenza è un insulto! Scappa finché sei in tempo! Scappa davanti al mio esercito!
River Raids = Incursori fluviali

Mutapa = Mutapa
Trade Link = Collegamento commerciale
Gain +1 [Gold] in capital from every extra Luxury resource\n+50% [Happiness] from every Luxury resource gifted by City-States\nResting point for Influence with City-States is increased by 1 for every Luxury resource = +1 [Gold] nella Capitale per ogni risorsa di lusso extra\n+50% [Happiness] per ogni risorsa di lusso offerta alle Città-Stato\n+1 limite minimo d'Influenza con le Città-Stato per ogni risorsa di lusso
Honor and praise to Nyanhewe Matope, Emperor of the Mwene we Mutapa, successor of the Zimbabwe. You are the son and successor of Nyatsimba Mutota, who abandoned the Great Zimbabwe to found the Mwenemutapa, Lord of the Conquered Land. By your hand, the empire encompassed most of the lands between Tavara and the Indian Ocean, uniting a number of different peoples in Southern Africa including Manyika and Tonga as well as the coastal Teve and Madanda. By the time the Portuguese landed on the coasts of Mozambique, the Mutapa empire was the most powerful state in the region, a mere 50 years following its birth. = Onore e lode a Nyanhewe Matope, Imperatore del Mwene we Mutapa, successore dello Zimbabwe. Tu sei il figlio e successore di Nyatsimba Mutota, che abbandonò il Grande Zimbabwe per fondare il Mwenemutapa, Signore della Terra Conquistata. Per tua mano, l'impero comprendeva la maggior parte delle terre tra Tavara e l'Oceano Indiano, unendo diversi popoli dell'Africa meridionale, tra cui Manyika e Tonga, nonché i Teve e i Madanda costieri. Quando i portoghesi sbarcarono sulle coste del Mozambico, l'impero Mutapa era lo stato più potente della regione, a soli 50 anni dalla sua nascita.
Noble Emperor of the Nwene we Mutapa, your kingdom fell to the Portuguese decades after your death, but your people still has hope for they know you will come back and lead your people to victory. Will you turn these hopes to reality? Will you take revenge on those who wronged you, your people and your successors? Can you build a civilization that will stand the test of time? = Nobile Imperatore dei Nwene we Mutapa, il tuo regno è caduto in mano ai portoghesi decenni dopo la tua morte, ma il tuo popolo nutre ancora speranza per te, sapendo che tornerai e guiderai il tuo popolo alla vittoria. Trasformerai queste speranze in realtà? Ti vendicherai di coloro che hanno ferito te, il tuo popolo e i tuoi successori? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
A shame a peaceful way to cohesist together couldn't be found. But fine: I accept your challenge. = Mi dispiace che non ci sia stato verso di mantenere la pace tra di noi. Ma va bene, raccolgo volentieri la sfida.
You cannot be trusted, and I find that the best way to solve this situation is through war! = Non ci si può fidare di te, e io ritengo che il modo migliore per risolvere questa situazione sia la guerra!
I am honored to meet you, noble king. As the leader of the Mutapa, I can offer you the chance to mark this day with a feast... and perhaps later, a trade route. = Sono onorato di incontrarti, nobile re. Come capo dei Mutapa, posso offrirti l'opportunità di celebrare questo giorno con una festa... e forse più tardi, con una rotta commerciale.
As I accepted your traders in my land, I hope you will do the same to mine. = Così come ho accolto i tuoi commercianti nella mia terra, spero che tu farai lo stesso con i miei.
Your words betray your nature. No Mutapa will trust you. = Le tue parole tradiscono la tua natura. Nessun Mutapa si fiderà di te.
Go on. Take my life. But know that you will only have destroyed all that remains of my people. Enjoy this slaughter while you can. = Forza. Prendi la mia vita. Ma sappi che avrai solo distrutto ciò che resta del mio popolo. Goditi questo massacro finché puoi.

The Harappans = Harappa
Went-Antu = Went-Antu
Oh ruler of the high house, lord of the western citadel, king whose name and exploits have been lost to time, we humbly praise and greet you! The people of the valleys of the Indus and Sarasvati rivers were one of the world's earliest urban civilizations. They surpassed Sumer, Egypt, and Xia in sheer size - stretching from the Iranian coast, to the base of the Himalayas, to the shores of western India - and their cities displayed a level of sophistication and urban planning unmatched in the ancient world. Indus traders connected distant empires, leaving their seals across the Middle-East and Southern Asia. Yet, as with all things lost to time, it was not meant to be. The climate changed, the Sarasvati dried up, the Vedic Aryans arrived to forever change the face of the Indian subcontinent. = Salute a te, Went-Antu, sovrano della civiltà di Harappa! O sovrano dell'alta casa, signore della cittadella occidentale, re il cui nome e le cui gesta sono andati perduti nel tempo, ti lodiamo e ti salutiamo umilmente! Gli abitanti delle valli dei fiumi Indo e Sarasvati furono una delle prime civiltà urbane del mondo. Superarono Sumer, Egitto e Xia per dimensioni, estendendosi dalla costa iraniana, ai piedi dell'Himalaya, fino alle coste dell'India occidentale, e le loro città mostravano un livello di sofisticatezza e pianificazione urbana senza pari nel mondo antico. I commercianti dell'Indo collegavano imperi lontani, lasciando i loro sigilli in tutto il Medio Oriente e l'Asia meridionale. Eppure, come per tutte le cose perse nel tempo, anche questo ebbe fine. Il clima cambiò, il Sarasvati si prosciugò, e gli Ariani vedici arrivarono a cambiare per sempre il volto del subcontinente indiano.
High One, will you let your people be forgotten? It is time to return, to fill the great baths and reestablish the trade routes that once sustained your mighty cities. Can you reclaim the land of the seven rivers? Can you build a civilization that will stand the test of time? = Ma il tuo popolo merita davvero di venire dimenticato, o re onnipotente? È tempo di tornare sulla terra dei vivi, di riempire le grandi terme e di ristabilire le rotte commerciali che un tempo sostenevano le tue possenti città. Riuscirai a riconquistare la terra dei sette fiumi? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
My people has enough of your harassment. = La mia gente ne ha abbastanza delle vostre molestie.
I only whished for a peaceful coexistence and mutually beneficial trade. = Desideravo solo una coesistenza pacifica e uno scambio reciprocamente vantaggioso.
I only wished for a peaceful coexistence and mutually beneficial trade. = Desideravo solo una coesistenza pacifica e uno scambio reciprocamente vantaggioso.
Who will there be left to trade with when you've conquered the world? = Ben fatto. Ora con chi potrete commerciare una volta che avrete conquistato il mondo?
We misinterpreted the nature of your character. = Abbiamo frainteso la vostra vera natura.
Welcome to the high country! Do you bring goods to trade? Could I interest you in some lapis lazuli or teak wood? = Benvenuto nelle alte montagne di Harappa! Portate merci da commerciare? Forse potrebbe interessarvi del lapislazzuli o del legno di teak?
Hi. = Salve.
I hope you will welcome this generous offer. = Spero che accoglierete questa generosa offerta.
