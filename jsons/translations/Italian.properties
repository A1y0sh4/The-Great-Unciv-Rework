You are untrustworthy - and this is the worst kind of violence. = Tu sei un individuo inaffidabile... e questa è la peggior forma di violenza.

Gitarja = Gitarja
Before this war ends, you will know the fury of a thousand ships. = Prima che questa guerra finisca, conoscerai la furia di un migliaio di navi.
Are you serious? Didn't you know my vengeance puts monsoons to shame? Soon you will. = Cos'è, uno scherzo? Non lo sai che la mia vendetta fa impallidire i monsoni? Bene, presto lo imparerai.
The dream of Nusantara is lost to the turning tide. = La ruota gira... e il sogno di Nusantara è perduto.
I am Gitarja, Nusantara's queen and protector. Those who thought us weak litter the ocean floor. = Io sono Gitarja, regina e protettrice di Nusantara. Coloro che ci consideravano deboli mancandoci di rispetto giacciono sul fondo degli abissi.
What if we make a deal, you and me? = Proviamo a concludere questa faccenda tra noi due...
And here the ill tide rolls in. = Sentiamo un po' la vostra offerta...
