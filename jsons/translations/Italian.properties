The despicable ways you treat the working class are repulsive. I declare a revolution against you! = I modi con cui tratti la classe operaia sono spregevoli e rivoltanti! È giusto che ci sia una rivoluzione!
You are an enemy of the revolution! = Tu sei un nemico della rivoluzione, e come tale vai distrutto!
You greedy capitalist cannot suffocate this revolution. = Non puoi soffocare questa rivoluzione, digraziato capitalista. Noi trionferemo!
You may have defeated our forces, but you'll never bend our ideals in favour of your exploitation. = Ci hai sconfitti solo militarmente, ma non riuscirai mai a piegare i nostri ideali in favore dei tuoi malvagi sfruttamenti.
