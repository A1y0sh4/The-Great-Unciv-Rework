All hail elected King Sigismund III, protector and sovereign of the Kingdom of Poland, he who defied heresy and gave Poland a strong and stable government. Toward this end, you oversaw the arrival of the Jesuits who established new schools throughout Poland and became chaplains and confessors to many families. The Catholic Church in Poland rebounded strongly during the early years of the reign. Their preaching was very well received by the public and along with their staunch defense of the faith they also reminded Poles of their crucial role as the first line of defense for Catholic Christendom against the Orthodox Russians and the Ottoman Turks. = Lode al re eletto Sigismundo III, protettore e sovrano del Regno di Polonia, colui che sfidò l'eresia e diede alla Polonia un governo forte e stabile. A tal fine tu favoristi l'arrivo dei gesuiti che fondarono nuove scuole in tutta la Polonia e divennero cappellani e confessori di molte famiglie. La Chiesa cattolica in Polonia ebbe una forte ripresa durante i primi anni del regno. La loro predicazione fu accolta molto bene dal pubblico e, oltre alla strenua difesa della fede, ricordarono ai polacchi anche il loro ruolo cruciale come prima linea di difesa della cristianità cattolica contro i russi ortodossi e i turchi ottomani.
Honored king Sigismund, the people have chosen you as their leader. Can you keep the kingdom and your subjects in the golden age of prosperity? Will you conquer weakened enemies or tolerate their faith and existence? Can you build a civilization that will stand the test of time? = Onorato re Sigismondo, il popolo ti ha scelto come loro leader. Riuscirai a mantenere il regno e i tuoi sudditi nell'età dell'oro della prosperità? Conquisterai i nemici indeboliti o tollererai la loro fede e la loro esistenza? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Poland = Polonia
+15% [Culture] and [Science] generation in cities following an enhanced religion during a We Love The King Day\nGain +1 [Happiness], +1 [Faith] per every 2 social policies adopted = +15% generazione di [Culture] e [Science] nelle città che seguono una religione potenziata durante una festa Viva il Re\n+1 [Happiness] e [Faith] ogni 2 politiche sociali adottate
I am a pure and humble servant of God who has nothing to hide. My coscience is clean, unlike yours. = Sono un servo di Dio puro e umile che non ha nulla da nascondere. La mia coscienza è pulita, a differenza della tua.

Greetings and blessings be upon you, Kamehameha the Great, chosen by the heavens to unite your scattered peoples. Oh mighty King, you were the first to bring the Big Island of Hawai'i under one solitary rule in 1791 AD. This was followed by the merging of all the remaining islands under your standard in 1810. As the first King of Hawai'i, you standardized the legal and taxation systems and instituted the Mamalahoe Kawanai, an edict protecting civilians in times of war. You ensured the continued unification and sovereignty of the islands by your strong laws and deeds, even after your death in 1819. = Salute e benedizione su di te, Kamehameha il Grande, prescelto dal cielo per unire il tuo popolo disperso. O potente re, tu fosti il primo a estendere il tuo dominio sulla Grande Isola di Hawaii nel 1791. Seguì l'unificazione di tutte le altre isole sotto il tuo stendardo, completata nel 1810. Come primo re delle Hawaii, hai riorganizzato il sistema legale e fiscale e hai istituito il Mamalahoe Kanawai, un editto che protegge i civili in tempo di guerra. Con le tue leggi e le tue grandi gesta hai assicurato che le isole continuassero a rafforzare la loro unione e a mantenere la loro sovranità, anche dopo la tua morte, avvenuta nel 1819.
Oh wise and exalted King, your people wish for a kingdom of their own once more and require a leader of unparalleled greatness! Will you answer their call and don the mantle of the Lion of the Pacific? Will you build a kingdom that stands the test of time? = 
All units can embark and enter Ocean tiles without the technological requirements\nEmbraked units gain +1 additional Movement and Sight = Le unità possono attraversare gli Oceani senza alcun requisito tecnologico\n+1 Movimento e Visione per le unità imbarcate
Well, it appears your bad behaviour has defined our history. That... is unfortunate. = Pare dunque che il tuo cattivo comportamento ha segnato la nostra storia. ...che peccato.

Maria I = Maria I
I'm afraid I cannot allow your kingdom to exist for much longer! I hope you won't mind... = Temo di non poter più permettere al tuo regno di esistere. Spero non ti dispiaccia...
You cannot be serious! = Vorrai scherzare?!
I know little about this conflict... I'll have to consult my regent... = Non sapevo nulla di questo conflitto... Vado a consultare il mio reggente...
I am Maria, Queen of Portugal! Have we met before? You look familiar to me... Or maybe not. = Benvenuto. Sono Maria, Regina del Portogallo. Dimmi, non ci siamo già visti? Mi sembri familiare... o forse no...
Will you consider this offer? = Vorresti prendere in considerazione quest'offerta?
Good morning. = Buongiorno.
Why did you come? = Perché sei qui?
Discovery Age = Età della Scoperta
Blessings be upon you, most gracious Queen Maria, protector and sovereign of the Portuguese people. As the first ever Queen regnant of Portugal, it was your wise stewardship that protected the royal court from the incursions of Napoleon, establishing a safe haven in Brazil to preserve the integrity of Portuguese rule. Despite struggling with illness throughout your reign, your effort to ensure Portugal's close cooperation with Brazil are credited with helping that state gain its eventual independence - and for this you will always be admired and respected by the people of both nations. = Che tu sia benedetta, misericordiosa regina Maria, sovrana e protettrice del popolo portoghese. Prima regina regnante del Portogallo, con il tuo saggio consiglio hai salvato la corte reale dalle incursioni di Napoleone, stabilendola in Brasile e proteggendo così l'indipendenza del governo portoghese. Nonostante tu abbia dovuto lottare costantemente con la malattia, ti sei sforzata di assicurare una salda cooperazione con il Brasile, che anche grazie a questo è giunto a ottenere la propria indipendenza: per questo sarai sempre ammirata e rispettata da entrambe le nazioni.
Oh noble and pious queen, will you once again guide the kingdom of Portugal in the spirit of cooperation and prosperity? Will you establish a new legacy, one that will surpass all those who come before you? Can you build a civilization that will stand the test of time? = Nobile  epia regina, guiderai ancora una volta il regno del Portogallo nello spirito della cooperazione e della prosperità? Fonderai un nuovo impero capace di superare tutti quelli venuti prima di te? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
