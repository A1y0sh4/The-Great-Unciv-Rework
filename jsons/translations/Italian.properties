The people rally to your banner, O’ Agostinho Neto, poet of liberation and father of a free Angola! Though raised beneath the shadow of Portuguese colonial rule, you chose not submission, but struggle, devoting your life to the cause of national independence and the emancipation of the worker and peasant alike. Across the plains, forests, and crowded streets of Luanda, the cry for liberation grew ever louder, and the centuries-long grip of empire began to fracture. Through revolution and sacrifice, the MPLA carried the dream of sovereignty into reality, and under your leadership Angola emerged into history as a socialist republic determined to reclaim its destiny. = Il tuo popolo è pronto a seguire il tuo sendardo, Agostinho Neto, poeta della liberazione e padre di un'Angola libera! Cresciuto all'ombra del dominio coloniale portoghese, al posto della sottomissione hai scelto la lotta, dedicando la tua vita alla causa dell'indipendenza nazionale e all'emancipazione di operai e contadini. Attraverso le pianure, le foreste e le affollate strade di Luanda, il grido di liberazione si è fatto sempre più forte e la morsa secolare dell'impero ha cominciato a sciogliersi. Tramite la rivoluzione e il sacrificio, l'MPLA ha trasformato il sogno di sovranità in realtà e, sotto la tua guida, l'Angola è entrata nella storia come una repubblica socialista determinata a riappropriarsi del proprio destino.
Steadfast revolutionary, the struggle returns once more before you, the Voice of the Angolan People. Foreign powers circle your homeland, while greed and division threaten to consume the hard-won gains of independence. Yet the spirit of liberation still burns within the hearts of workers, soldiers, and farmers who look to you for guidance and resolve. Can you unite the people against exploitation and domination? Can you build a civilization that will stand the test of time? = Rivoluzionario indomito, Voce del Popolo Angolano, la lotta ritorna ancora una volta a ripresentarsi. Potenze straniere circondano la tua patria, mentre l'avidità e la divisione minacciano di distruggere le conquiste ottenute a fatica con l'indipendenza. Ma lo spirito di liberazione arde ancora nei cuori di operai, soldati e contadini che guardano a te in cerca di guida e determinazione. Saprai unire il popolo contro lo sfruttamento e la dominazione? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Your profits keep raising as does the hunger and misery of your people. We must liberate them from the yoke of your oppression with a revolutionary war. = I tuoi profitti continuano ad aumentare, così come la fame e la miseria del tuo popolo. Non resta che liberarli dal giogo della tua oppressione, con una guerra rivoluzionaria.
You cannot suffocate the spark of this revolution. = Non ho paura di te. Non riuscirai a soffocare le fiamme della rivoluzione.
For now you may have defeated our forces. But remember that, while your form of exploitation creates immense wealth for the few at the expense of living conditions of the many, you are also inevitably producing your own grave-diggers. A future generation of revolutionares will come. = Avrai anche sconfitto le nostre forze. Ma ricorda che, mentre lo sfruttamento crea immense ricchezze per pochi a scapito delle condizioni di vita di molti, stai anche sfamando i tuoi becchini, a tua insaputa. Arriverà il giorno di una futura generazione di rivoluzionari.
You vilify us because you know that, by smashing class society and the forms of oppression that kept it in place, we are creating the conditions for your downfall. = Tu ci diffami sapendo che, distruggendo la società di classe e le forme di oppressione che la mantenevano in piedi, stiamo creando le condizioni per la tua rovina.
Greetings, I am Comrade Agostinho Neto. I hope you will soon join our side for the struggle to end all systematic forms of oppression. = Saluti, sono il compagno Agostinho Neto. Spero che un giorno ci uniremo nella lotta in comune per porre fine a tutte le forme sistematiche di oppressione.
In the name of the revolution, here is a fair offer: = Nel nome della rivoluzine, ecco una saggia offerta:
People’s War of Liberation = Guerra di Liberazione Popolare
Upon being declared war on by a Major Civilization, all Resources gain -1 [Gold] and +1 [Production] for 8 turns (modified by game speed)\nScout units gain the Survivalism I and Mercenary promotions\nMay not build [Stock Exchange] but gain +6 [Gold] from every [Factory] = -1 [Gold] e +1 [Production] per 8 turni (a seconda della velocità di gioco) quando un'altra civiltà ti dichiara guerra\nGli Esploratori ottengono le promozioni Sopravvivenza I e Mercenari\nNon puoi costruire [Stock Exchange], ma ottieni +6 [Gold] da ogni [Factory]

Praise be to you, King Mvemba a Nzinga, Afonso I of Kongo. When you ascended to the throne in 1509, your kingdom was in the throes of monumental change. Under your father, the Portuguese had established a foothold, and with it the great forces of the Catholic faith. Wisely and piously, you continued these efforts and strove to complete the conversion of Kongo into a Catholic nation. With a mind for the education of your people, your partnership with Portugal would continue to revolutionise your kingdom long after your death in 1542. = Sia lode a te, re Mvemba a Nzinga, Afonso I del Kongo. Quando salisti al trono nel 1509, il tuo regno era nel pieno di un cambiamento epocale. Sotto tuo padre, i portoghesi avevano stabilito una solida presenza, portando con sé le grandi forze della fede cattolica. Con saggezza e devozione, continuasti questi sforzi e ti adoperasti per completare la conversione del Kongo in una nazione cattolica. Con a cuore l'istruzione del tuo popolo, la tua collaborazione con il Portogallo continuò a rivoluzionare il tuo regno ben oltre la tua morte, avvenuta nel 1542.
Devoted Afonso, Mother Earth has many gifts for you, but the tides of change have come once more to your kingdom. Keep an open mind, for the inspiration of the open world will let our people create art with power and majesty. Can you lead your people in these uncertain times and bring them faith and understanding? Can you build a civilization that will stand the test of time? = Devoto Afonso, Madre Terra ha molti doni per te, ma le maree del cambiamento imperversano ancora una volta sul tuo regno. Mantieni una mente aperta, perché l'ispirazione del mondo aperto permetterà al nostro popolo di creare arte con potenza e maestosità. Riuscirai a guidare il tuo popolo in questi tempi ignoti e a infondere in esso fede e comprensione? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
Your puny existence is a threat to our people's prosperity! You think you can walk over us so easily? I will not let it happen. Not to Kongo - not to my people! = La tua misera esistenza è una minaccia per la prosperità del nostro popolo! Credi di poterci calpestare così facilmente? Non lo permetterò. Non al Kongo, non al mio popolo!
We are no strangers to war. You have strayed from God's path, and now it is time to correct it. = Non siamo estranei alla guerra. Hai rigettato la via di Dio, ed è giunto il momento di correggerla.
Of the many who have tried to vanquish us, only you have succeeded. You are nothing but a glorified barbarian - cruel, ruthless and vain. = Tra i tanti che hanno tentato di sconfiggerci, solo tu ci sei riuscito. Non sei altro che un barbaro glorificato: crudele, spietato e vanitoso.
I have done nothing wrong, and the people of Kongo do not deserve your slander. = Non ho fatto nulla di male, e il popolo del Congo non merita le tue calunnie.
I am Mvemba a Nzinga, and I greet you as a friend. I can see you are blessed by God. Are you here to share your enlightenment? = Sono Mvemba a Nzinga, e ti saluto come amico. Vedo che è Dio che ti benedice. Sei qui per condividere la tua illuminazione?
Here's a fair offer. = Ecco un'offerta giusta.
Nkisi = Nkisi
Gain +1 [Gold], +1 [Faith] and +1 [Culture] per turn per every number of Ancient ruins you've visited and Barbarian encampments you've cleared throughout the game.\n-3% [Faith] purchasing costs per every number of Ancient ruins you've visited and Barbarian encampments you've cleared throughout the game. = Per ogni Antica Rovina visitata e Accampamento barbaro distrutto, ottieni +1 [Gold], [Faith] e [Culture] al turno, e i costi in [Faith] nelle città calano del 3%.

The Mississippians = Mississippi
Tuskaloosa = Tuskaloosa
Hensci, Tuskaloosa, Chief of Atahachi and leader of the Mississippian people! Your prowess in battle is matched only by your cunning. The culmination of the mound builder tradition, the Mississippi represent one of the most advanced societies of pre-Columbian North America. A gifted and industrious people, they developed widespread trade networks and utilized impressive agricultural projects to sustain some of the largest cities in the medieval world. Yet, the Little Ice Age would ultimately devastate the great population centers of Cahokia and Moundville; destroying their economy and dispersing their people. By the time Europeans arrived in the Americas, the Mississippi were a mere shadow of their former selves and the legacy of the mound builders would soon fade into legend. = Hensci, Tuskaloosa, capo degli Atahachi e condottiero del popolo del Mississippi! La tua abilità in battaglia è pari solo alla tua astuzia. Culmine della tradizione dei costruttori di tumuli, i Mississippi rappresentano una delle società più avanzate del Nord America precolombiano. In quanto popolo dotato e industrioso, svilupparono vaste reti commerciali e utilizzarono imponenti progetti agricoli per sostenere alcune delle più grandi città del mondo medievale. Ma la Piccola Era Glaciale avrebbe infine devastato i grandi centri abitati di Cahokia e Moundville, distruggendone l'economia e disperdendone la popolazione. Quando gli europei giunsero nelle Americhe, i Mississippi erano solo un'ombra di se stessi e l'eredità dei costruttori di tumuli sarebbe presto svanita nella leggenda.
Feared warrior, the Mississippian culture has all but vanished and even your descendants have forgotten the great earthworks of their ancestors. It is time to return, to reclaim the Big River, and grow the maize that once sustained your mighty cities. Can you restore your lost chiefdom? Can you build a civilization that will stand the test of time? = O guerriero temerario, la cultura del Mississippi è quasi del tutto scomparsa e persino i tuoi discendenti hanno dimenticato le grandi opere in terra dei loro antenati. È tempo di tornare, di reclamare il Grande Fiume e di coltivare il mais che un tempo sosteneva le tue possenti città. Riuscirai a ricostruire il tuo regno perduto? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
My people has enough of your harassment. = La mia gente ne ha abbastanza delle tue angherie.
I only whished for a peaceful coexistence and mutually beneficial trade. = Volevo soltanto una coesistenza pacifica dove commerciavamo in pace.
Like a coward, you hide behind your men! Cehecvres! = Come un codardo, ti nascondi dietro i tuoi uomini! Cehecvres!
We misinterpreted the nature of your character. = Temo proprio di aver frainteso la tua vera natura.
Hensci! I am Tuskaloosa, Chief of Atahachi and leader of the Mississippian people. You are welcome to trade and make offering in my cities. = Hensci! Io sono Tuskaloosa, capo degli Atahachi e del popolo del Mississippi. Siate i benvenuti a commerciare e a offrire tributi alle mie città.
Maize Economy = Economia del mais






