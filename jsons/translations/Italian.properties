I will do everything possible to ensure that the noble patrimony of the Church is not sold or alienated in any way. = Farò il possibile perché il nobile patrimonio della Chiesa non venga venduto o alienato in alcun modo.
I don't worry about my life, but about my fame. = Non mi preoccupo della mia vita, ma della mia fama.
Greetings, I am Julius II, the disciple of Christ and apostolic succesor to Saint Peter. = Salve, io sono Giulio II, discepolo di Cristo e successore di San Pietro.
If the Church is the body of Christ, then the Pope is his voice. Listen to what he has to say. = Se la Chiesa è il corpo di Cristo, allora il Papa è la sua voce. Ascolta quello che ha da dire.
Don't waste my time! = Non sprecare il mio tempo!
