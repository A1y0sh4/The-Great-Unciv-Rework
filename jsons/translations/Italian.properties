As a gesture of goodwill and generosity, I have decided to share the riches of Nubia with you. May our swords never cross. = Come segno di generosità e benevolenza, ho deciso di condividere con le te ricchezze della Nubia. Che le nostre spade non debbano mai incrociarsi.
Blessings of Amun be upon thee, o magnificent Amanitore, Kandake Queen of Nubia and Kush! Your ancestors include legendary Piye, he who conquered Egypt after centuries of subjugation, and yours is a land of wealth and plenty, located high up the Nile river, between Egypt and Ethiopia. While ruling alongside your son Natakamani, you were involved in restoring large temples at Meroe and Napata, demolished by the evil Romans, your contemporaries, and the building of over two hundred nubian pyramids, as if your people were the true heirs of the ancient Egyptian empire of about a millennia earlier. Your rule marked the prosperity peak of Nubia and Meroitic history, and your civilization would exist for more than two centuries after your were gone, and the kingdom of Kush only ceased to exist when Christianity was changing the world forever. = Che le benedizioni di Amon scendano su di te, o magnifica Amanitore, regina Kandake di Nubia e Kush! Tra i tuoi antenati figurano il leggendario Piye, colui che conquistò l'Egitto dopo secoli di sottomissione, e la tua è una terra di ricchezza e abbondanza, situata in alto sul fiume Nilo, tra l'Egitto e l'Etiopia. Mentre governavi insieme a tuo figlio Natakamani, tu fosti coinvolta nel restauro di grandi templi a Meroe e Napata, demoliti dai malvagi Romani, tuoi contemporanei, e nella costruzione di oltre duecento piramidi nubiane, come se il tuo popolo fosse il vero erede dell'antico impero egiziano di circa un millennio prima. Il tuo governo segnò l'apice della prosperità della Nubia e della storia meroitica, e la tua civiltà sarebbe esistita per più di due secoli dopo la tua scomparsa; il regno di Kush cessò di esistere solo quando il cristianesimo stava cambiando il mondo per sempre.
Watchful Queen of Nubia, the empire you command deserves to claim the horizon as its border, and your cities to know prosperity and piety, for the Land of the Bow honors its past as surely as it builts its own future. Will you once again replenish this parched land with the blessings of the gods and the wisdom of your divine rule? Can you build a civilization that will stand the test of time? = Vigile regina della Nubia, l'impero che comandi merita di rivendicare l'orizzonte come suo confine, e le tue città di conoscere prosperità e pietà, perché la Terra dell'Arco onora il suo passato con la stessa certezza con cui costruisce il suo futuro. Riporterai ancora una volta in auge quest'arida terra con le benedizioni degli dei e la saggezza del tuo governo divino? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
I will not ask how you dare say such a vile thing. With you, I always expect the worst. = Non ti chiederò come osi dire una cosa così vile. Con te, mi aspetto sempre il peggio.

