You vilify us because you know that the liberation of the working class will put an end to your sick relentless pursuit of wealth. = Il tuo insulto nasce dal fatto che tu sai che la liberazione della classe operaia porrà fine alla tua infame ricerca alla ricchezza infinita.
The proletariat rises in your name, O' Vladimir Lenin, leader of this glorious revolution! Though born into wealth, you chose instead to turn to the cause of the working class, taking your place as leader of the Bolshevik Party in a pledge to forge a nation dictated by men of the soil. A storm war brewing in the heart of mighty Russia, and the days of the Tsars were drawing to a close. With the Russian Revolution in 1918, the last Tzar Nicholas II was overthrown, and the monarchy which had raised Russia for centuries was finally undone. With you at the helm of a new, socialist Republic, Russia would begin its journey into modernity. = Il proletariato si solleva in tuo nome, o grande Vladimir Lenin, guida di questa gloriosa rivoluzione! Pur essendo nato nella ricchezza, hai scelto di volgerti alla causa della classe operaia, assumendo il ruolo di leader del Partito Bolscevico, con la promessa di forgiare una nazione dettata da uomini del suolo. Una guerra tempestosa stava nascendo nel cuore della potente Russia, e i giorni degli Zar volgevano al termine. Con la Rivoluzione Russa del 1918, l'ultimo Zar Nicola II fu rovesciato e la monarchia che aveva sostenuto la Russia per secoli fu infine disfatta. Con te alla guida di una nuova Repubblica socialista, la Russia avrebbe iniziato il suo viaggio verso l'età moderna.
Dauntless revolutionary, once again the fires of change must by ignited by you, the Champion of a New Russia. The will of the proletariat lies broken beneath the crowns of proud and greedy autocrats, and demands your determination to inspire strenght. Can you bring forth the will of your brothers against their slavery? Can you build a civilization that will stand the test of time? = O intrepido rivoluzionario, ancora una volta le fiamme del cambiamento vanno attizzare dal Campione di una Nuova Russia. La volontà del proletariato giace spezzata sotto le corone di autocrati superbi e avidi, e richiede la tua determinazione a ispirare forza e volontà. Saprai far emergere la volontà dei tuoi fratelli contro la loro schiavitù? Riuscirai a plasmare una civiltà in grado di superare la prova del tempo?
In the name of the revolution, here is a fair offer: = Questa bella offerta ti giunge nel nome della rivoluzione...

