A sad set of words. It pains me that I had to make acquaintance with someone as despicable as you. = Un triste insieme di parole. Mi addolora dover fare la conoscenza di una persona spregevole come te.

Bà Triệu = Bà Triệu
Now you are at war with Vietnam. Do you hear our trumpets? The thunder of our elephants? They are coming for you! = Senti il suono dei tamburi? Odi la cacofonia degli elefanti? È il Vietnam che ti muove guerra! E viene a prenderti!
I have waited for this day for a long time. Today begins the war that will end in your destruction. = Aspettavo questo giorno da molto tempo. Oggi inizia la guerra che porterà alla tua distruzione!
Do you think you have defeated me? I will ascend to heaven, and become the immortal spirit of our resistance! = Tu credi davvero di avermi sconfitto? Io salirò in cielo e diventerò lo spirito immortale della nostra resistenza!
I am Lady Trieu, the general who wears the golden robe. Welcome to Vietnam. = Io sono Ba Trieu, il generale che indossa il mantello dorato. Benvenuto in Vietnam.
