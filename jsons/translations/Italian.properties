'The dirty truth is that the rich are the great cause of poverty. When large surpluses are accumulated by the few, then want and deprivation will be endured by the many who have created the surplus.' - Michael Parenti = 'La cruda verità è che i ricchi sono la principale causa della povertà. Quando grandi eccedenze vengono accumulate da pochi, allora la miseria e la privazione saranno sopportate dai molti che hanno creato quell'eccedenza.' - Michael Parenti

'For my part, I wish all guns with their belongings and everything could be sent to hell, which is the proper place for their exhibition and use.' - Alfred Nobel = 'Da parte mia, vorrei che tutte le armi, con i loro accessori e tutto il resto, fossero spedite all'inferno, che è il luogo appropriato per la loro esposizione e il loro utilizzo.' - Alfred Nobel

'Those who do not move, do not notice their chains.' - Rosa Luxemburg = 'Chi non si muove, non si accorge delle proprie catene.' - Rosa Luxemburg

'Just as, to the bourgeois, the disappearance of class property is the disappearance of production itself, so the disappearance of class culture is to him identical with the disappearance of all culture. That culture, the loss of which he laments, is, for the enormous majority, a mere training to act as a machine.' - Karl Marx & Friedrich Engels = 'Così come, per il borghese, la scomparsa della proprietà di classe equivale alla scomparsa della produzione stessa, allo stesso modo la scomparsa della cultura di classe equivale per lui alla scomparsa di tutta la cultura. Quella cultura, di cui egli lamenta la perdita, è, per la stragrande maggioranza, un mero addestramento ad agire come una macchina.' - Karl Marx e Friedrich Engels

'The freedom of the free was the cause of the great oppression of the slaves…' - Domenico Losurdo = 'La libertà dei liberi era la causa della grande oppressione degli schiavi...' - Domenico Losurdo

'Religious suffering is, at one and the same time, the expression of real suffering and a protest against real suffering. Religion is the sigh of the oppressed creature, the heart of a heartless world, and the soul of soulless conditions. It is the opium of the people.' - Karl Marx = 'La sofferenza religiosa è, al tempo stesso, espressione di una sofferenza reale e protesta contro di essa. La religione è il sospiro della creatura oppressa, il cuore di un mondo senza cuore e l'anima di condizioni senz'anima. È l'oppio dei popoli.' - Karl Marx

'To ravage, to slaughter, to usurp under false titles, they call empire, and where they make a desert, they call it peace.' - Publius Cornelius Tacitus = 'Rubare, trucidare, usurpare, con false parole lo chiamano impero, e dove fanno il deserto, la chiamano pace.' - Publio Cornelio Tacito, discorso di Calgaco

'If a machine is expected to be infallible, it cannot also be intelligent.' - Alan Turing = 'Se ci si aspetta che una macchina sia infallibile, non può essere anche intelligente.' - Alan Turing

'Those who lose dreaming are lost.' - Australian Aboriginal saying = 'Coloro che smettono di sognare sono perduti.' - Detto aborigeno australiano

'A skyscraper is a boast in glass and steel.' - Mason Cooley = 'Un grattacielo è una vanteria fatta di vetro e acciaio.' - Mason Cooley

'Equipped with his five senses, man explores the universe around him and calls the adventure Science.' - Edwin Hubble = 'Dotato dei suoi cinque sensi, l'uomo esplora l'universo che lo circonda e chiama quest'avventura Scienza.' - Edwin Hubble

'The wonder is, not that the field of stars is so vast, but that man has measured it.' - Anatole France = 'La cosa sorprendente non è che il campo stellare sia così vasto, ma che l'uomo sia riuscito a misurarlo.' - Anatole France

'Most likely anything that you think of that is possible isn’t true. In fact that’s a general principle in physics theories: no matter what a guy thinks of, it’s almost always false.' – Richard Feynman = 'Tutto ciò che si pensa sia possibile in realtà è molto probabilmente falso. In effetti, questo è un principio generale delle teorie fisiche: non importa cosa pensi una persona, è quasi sempre falso.' – Richard Feynman

'If history shows anything, it is that there's no better way to justify relations founded on violence, to make such relations seem moral, than by reframing them in the language of debt — above all, because it immediately makes it seem that it's the victim who's doing something wrong.' - David Graeber = 'Se la storia ci insegna qualcosa, è che non c'è modo migliore per giustificare relazioni fondate sulla violenza, per farle apparire morali, che riformularle nel linguaggio del debito, soprattutto perché in questo modo sembra immediatamente che sia la vittima a commettere un errore.' - David Graeber

'Is fascism merely a dictatorial force in the service of capitalism? That may not be all it is, but that certainly is an important part of fascism’s raison d’être, the function Hitler himself kept referring to when he talked about saving the industrialists and bankers from Bolshevism.' - Michael Parenti = 'Il fascismo è semplicemente una forza dittatoriale al servizio del capitalismo? Forse non è solo questo, ma certamente rappresenta una parte importante della ragion d'essere del fascismo, la funzione a cui lo stesso Hitler faceva riferimento quando parlava di salvare gli industriali e i banchieri dal bolscevismo.' - Michael Parenti

'The modern class-conscious worker, reared by large-scale factory industry and enlightened by urban life, contemptuously casts aside religious prejudices, leaves heaven to the priests and bourgeois bigots, and tries to win a better life for himself here on earth.' - Vladimir Lenin = 'Il lavoratore moderno dotato di coscienza di classe, cresciuto nell'industria manifatturiera su larga scala e illuminato dalla vita urbana, respinge con disprezzo i pregiudizi religiosi, lascia il paradiso ai preti e ai bigotti borghesi e cerca di conquistarsi una vita migliore qui sulla terra.' - Vladimir Lenin

'We want to achieve a new and better order of society: in this new and better society there must be neither rich nor poor; all will have to work. Not a handful of rich people, but all the working people must enjoy the fruits of their common labour... This new and better society is called socialist society.' - Vladimir Lenin = 'Vogliamo realizzare un nuovo e migliore ordine sociale: in questa nuova e migliore società non ci dovranno essere né ricchi né poveri; tutti dovranno lavorare. Non una manciata di ricchi, ma tutti i lavoratori dovranno godere dei frutti del loro lavoro comune... Questa nuova e migliore società si chiama società socialista.' - Vladimir Lenin




